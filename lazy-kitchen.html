an class=\"term-card__category\">grain</span>\n      \n    </div>\n    <div class=\"term-card__zh\">面条</div>\n    <div class=\"term-card__en\">Noodles</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">technique</span>\n      \n    </div>\n    <div class=\"term-card__zh\">焯水</div>\n    <div class=\"term-card__en\">Blanch</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">technique</span>\n      \n    </div>\n    <div class=\"term-card__zh\">红烧</div>\n    <div class=\"term-card__en\">Hongshao braise</div>\n    <div class=\"term-card__alias\">alias · en: red-braise</div>\n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">technique</span>\n      \n    </div>\n    <div class=\"term-card__zh\">上浆</div>\n    <div class=\"term-card__en\">Velveting</div>\n    \n    \n  </div></div>","lang":"zh"},"zh/pack/dry/canton-clear-beef":{"title":"DRY-CANTON-CLEAR-BEEF-v1 / 广式清汤牛腩香料包","html":"<h1>DRY-CANTON-CLEAR-BEEF-v1 / 广式清汤牛腩香料包</h1>\n<p><span class=\"status status-approved\">approved</span> <span class=\"cuisine\">粤 · CN</span></p>\n<blockquote>\n<p>端到端示例 SKU。所有字段 maintainer 已审 + 跨 CLI 二审过。</p>\n</blockquote>\n<h2>风味档案</h2>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>描述</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>味型</td>\n<td>清汤底、白胡椒香、萝卜清甜、牛腩本味</td>\n</tr>\n<tr>\n<td>flavor_tags</td>\n<td>clear, umami, light</td>\n</tr>\n<tr>\n<td>辣度</td>\n<td>0</td>\n</tr>\n<tr>\n<td>火候</td>\n<td>simmer (微火)</td>\n</tr>\n<tr>\n<td>饮食</td>\n<td>no-pork, gluten-free, nut-free, dairy-free</td>\n</tr>\n</tbody></table>\n<h2>内容物</h2>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>用量</th>\n<th>备注</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>八角</td>\n<td>1 颗</td>\n<td></td>\n</tr>\n<tr>\n<td>香叶</td>\n<td>1 片</td>\n<td></td>\n</tr>\n<tr>\n<td>白胡椒粒</td>\n<td>1 茶匙</td>\n<td></td>\n</tr>\n<tr>\n<td>陈皮</td>\n<td>1 小片</td>\n<td>可选；增加香气层次</td>\n</tr>\n</tbody></table>\n<h2>产出</h2>\n<ul>\n<li>1 包配 600–800g 牛腩 + 500–800g 白萝卜 + 1.5–2L 水</li>\n</ul>\n<h2>分装</h2>\n<ol>\n<li>整香料放入茶包袋</li>\n<li>外层用真空袋封口</li>\n<li>常温避光防潮存放</li>\n</ol>\n<p>引用 SOP: <a href=\"../../../../data/sop.yaml\">SOP-VACUUM-DRY-001</a></p>\n<h2>配套使用</h2>\n<ul>\n<li>食材: 牛腩、白萝卜、姜</li>\n<li>SOP: <a href=\"../../../../data/sop.yaml\">SOP-BLANCH-MEAT-001</a> → <a href=\"../../../../data/sop.yaml\">SOP-CANTON-CLEAR-BEEF-001</a></li>\n</ul>\n<h2>用于哪些菜</h2>\n<ul>\n<li><a href=\"#/zh/compose/canton-clear-beef-noodles\">DISH-CN-CANTON-CLEAR-BEEF-NOODLES</a> — 清汤牛腩粉</li>\n</ul>\n<h2>储藏</h2>\n<p><code>pantry-dry-dark</code>：常温避光防潮 6–24 个月（详见 <a href=\"../../../../data/storage-profiles.yaml\">storage-profiles.yaml</a>）。</p>\n<h2>真源</h2>\n<p>详见 <a href=\"../../../../data/sku/dry.yaml\">data/sku/dry.yaml</a> 的 <code>DRY-CANTON-CLEAR-BEEF-v1</code> 条目。</p>\n<div class=\"giscus-wrapper\"><div class=\"empty\">\n      <div class=\"empty__title\">💬 Discussion</div>\n      <div class=\"empty__sub\">Giscus would mount here at term=canton-clear-beef (set GISCUS_REPO_ID env to enable)</div>\n    </div></div>","lang":"zh"},"zh/pack/index":{"title":"预制 / Pack — SKU 货架","html":"<h1>预制 / Pack — SKU 货架</h1>\n<p>5 种 SKU 类型:</p>\n<table>\n<thead>\n<tr>\n<th>类型</th>\n<th>含义</th>\n<th>储藏</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>DRY</strong></td>\n<td>干货香料包（茶包袋 + 真空）</td>\n<td>常温避光防潮 1–3 年</td>\n</tr>\n<tr>\n<td><strong>WET</strong></td>\n<td>湿酱包（液体真空冷冻）</td>\n<td>-18°C 6–12 个月</td>\n</tr>\n<tr>\n<td><strong>COOKED</strong></td>\n<td>熟底（制熟后冷冻）</td>\n<td>-18°C 3–6 个月</td>\n</tr>\n<tr>\n<td><strong>SOUP</strong></td>\n<td>汤底（浓缩汤底）</td>\n<td>-18°C 6–12 个月</td>\n</tr>\n<tr>\n<td><strong>READY</strong></td>\n<td>即食热食（备餐场景）</td>\n<td>-18°C 1–2 个月</td>\n</tr>\n</tbody></table>\n<h2>v1 数据</h2>\n<ul>\n<li><a href=\"../../../data/sku/dry.yaml\">data/sku/dry.yaml</a> — 6 个 (1 个全填: 清汤牛腩)</li>\n<li><a href=\"../../../data/sku/wet.yaml\">data/sku/wet.yaml</a> — 2 个占位</li>\n<li><a href=\"../../../data/sku/cooked.yaml\">data/sku/cooked.yaml</a> — 1 个占位</li>\n<li><a href=\"../../../data/sku/soup.yaml\">data/sku/soup.yaml</a> — 空（首批将由酱油拉面、越南河粉引入）</li>\n<li><a href=\"../../../data/sku/ready.yaml\">data/sku/ready.yaml</a> — 空（v2 备餐子集）</li>\n</ul>\n<h2>端到端示例</h2>\n<p><a href=\"#/zh/pack/dry/canton-clear-beef\">DRY-CANTON-CLEAR-BEEF-v1 详细页</a> — 完整字段，可作为新 SKU 的模板。</p>\n<h2>增长</h2>\n<p>新 SKU 不在 v1 仓库里预创建，由 maintainer 通过 <code>add-dish</code> skill 触发 <code>propose_new</code> 路径渐增。预测全菜单完成后约 44 个 SKU。</p>\n","lang":"zh"},"zh/pack/packaging-guide":{"title":"分装指南 / Packaging guide","html":"<h1>分装指南 / Packaging guide</h1>\n<h2>什么必须分装</h2>\n<ul>\n<li>整香料组合（DRY 包）→ 茶包袋 + 真空</li>\n<li>干粉组合 → 小自封袋 + 外层真空</li>\n<li>湿酱 → 真空袋（液体模式封）+ 冷冻</li>\n<li>熟底 → 冷却后真空 + 冷冻</li>\n<li>腌肉包 → 肉 + 腌料 + 真空冷冻</li>\n</ul>\n<h2>什么不要分装</h2>\n<table>\n<thead>\n<tr>\n<th>类型</th>\n<th>原因</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>高频液体调料（生抽、鱼露、米醋）</td>\n<td>消耗快，瓶装直接用</td>\n</tr>\n<tr>\n<td>高频酱料（味噌、豆瓣酱）</td>\n<td>用量不固定</td>\n</tr>\n<tr>\n<td>基础食材（鸡蛋、豆腐、洋葱）</td>\n<td>留人参与感</td>\n</tr>\n<tr>\n<td>生鲜香草（香菜、薄荷、青柠）</td>\n<td>易坏，按需买</td>\n</tr>\n</tbody></table>\n<h2>谨慎分装</h2>\n<table>\n<thead>\n<tr>\n<th>类型</th>\n<th>原因</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>含鲜蒜的湿酱</td>\n<td>冷藏不宜久放，必须冷冻</td>\n</tr>\n<tr>\n<td>葱油 / 蒜油</td>\n<td>不建议常温长期存</td>\n</tr>\n<tr>\n<td>液体汤包</td>\n<td>先冷冻再真空，否则吸入封口机</td>\n</tr>\n<tr>\n<td>干粉直接真空</td>\n<td>粉末吸入机器，必须先内包茶包袋</td>\n</tr>\n</tbody></table>\n<h2>SOP 引用</h2>\n<ul>\n<li><a href=\"../../../data/sop.yaml\">SOP-VACUUM-DRY-001</a> — 干货真空</li>\n<li><a href=\"../../../data/sop.yaml\">SOP-VACUUM-LIQUID-001</a> — 液体真空</li>\n<li><a href=\"../../../data/sop.yaml\">SOP-LABELING-001</a> — 标签命名</li>\n</ul>\n<p>每个 SKU 的 <code>packaging_sop</code> 字段引用对应 SOP。</p>\n","lang":"zh"},"zh/ratios/index":{"title":"调味公式 / Ratios","html":"<h1>调味公式 / Ratios</h1>\n<p>详见 <a href=\"../../../data/ratios.yaml\">data/ratios.yaml</a>。</p>\n<h2>5 大经典母酱 + 中式扩展</h2>\n<p>LK 把 Escoffier 的 5 母酱 + 中式红烧基础作为 RATIO 一级实体的&quot;祖先&quot;，建立<strong>可继承的调味家族树</strong>:</p>\n<pre><code class=\"language-text\">RATIO-MOTHER-BECHAMEL-v1     白酱基底（牛奶 + 面糊）\nRATIO-MOTHER-VELOUTE-v1      天鹅绒酱（白色高汤 + 面糊）\nRATIO-MOTHER-ESPAGNOLE-v1    布朗酱（棕色高汤 + 焦化面糊）\nRATIO-MOTHER-HOLLANDAISE-v1  荷兰酱（蛋黄 + 黄油 + 柠檬）\nRATIO-MOTHER-TOMATO-v1       番茄基底\nRATIO-MOTHER-CN-BRAISE-v1    ★ 中式红烧基础\n</code></pre>\n<p>每个母酱在 yaml 里的 <code>daughters[]</code> 字段列出派生：贝夏梅尔加奶酪 → mornay；中式红烧加四料 → 鱼香等等。</p>\n<h2>v1 派生</h2>\n<ul>\n<li>RATIO-CN-FISHSCENT-v1（鱼香 1:1:1:1）— 红烧基础派生</li>\n<li>RATIO-PH-ADOBO-v1（菲式阿多波 1:1:1）</li>\n<li>RATIO-WEST-VINAIGRETTE-v1（油醋 3:1）</li>\n</ul>\n<h2>增长</h2>\n<p>新 RATIO 通过 add-dish skill 的 propose_new 路径渐增。预计完整菜单后约 13 个公式。</p>\n","lang":"zh"},"zh/start/hardware":{"title":"极简硬件 / Minimal hardware","html":"<h1>极简硬件 / Minimal hardware</h1>\n<p>LK 锁定的 <strong>10 件套 MVP</strong>：</p>\n<pre><code class=\"language-text\">刀具:    主厨刀 · 中式菜刀\n锅具:    炒锅 · 汤锅\n量具:    量勺 · 厨房秤\n耗材:    真空封袋器 · 真空袋 · 茶包袋 · 冷冻标签\n</code></pre>\n<p><strong>就这些。</strong></p>\n<p>需要烤箱 / 电饭煲 / 空气炸锅 / 料理机的菜，会在 dish 页顶部明确标 <code>hardware_extension</code>，并在 <a href=\"../../../data/hardware-extensions.yaml\">hardware-extensions.yaml</a> 列 workaround。</p>\n<p>每件硬件的完整 buying_guide（选购要点 / 规格建议 / 食安风险 / 常见坑 / 价位）见 <a href=\"#/zh/buy/hardware-guide\">硬件采购指南</a>。</p>\n","lang":"zh"},"zh/start/heat-and-oil":{"title":"火候 + 油温 / Heat & oil temperature","html":"<h1>火候 + 油温 / Heat &amp; oil temperature</h1>\n<p>两个独立维度:</p>\n<h2>火候档位</h2>\n<p>详见 <a href=\"../../../data/heat-tiers.yaml\">data/heat-tiers.yaml</a>。</p>\n<table>\n<thead>\n<tr>\n<th>ID</th>\n<th>中文</th>\n<th>英文</th>\n<th>视觉</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>high</td>\n<td>大火</td>\n<td>High</td>\n<td>锅冒烟、油哔啵声</td>\n</tr>\n<tr>\n<td>medium-high</td>\n<td>中大火</td>\n<td>Medium-high</td>\n<td>油面微动、下肉滋滋</td>\n</tr>\n<tr>\n<td>medium</td>\n<td>中火</td>\n<td>Medium</td>\n<td>油静止微暖</td>\n</tr>\n<tr>\n<td>medium-low</td>\n<td>中小火</td>\n<td>Medium-low</td>\n<td>锅边几乎无热感</td>\n</tr>\n<tr>\n<td>low</td>\n<td>小火</td>\n<td>Low</td>\n<td>汤面细密小泡</td>\n</tr>\n<tr>\n<td>simmer</td>\n<td>微火</td>\n<td>Bare simmer</td>\n<td>汤面几乎静止</td>\n</tr>\n</tbody></table>\n<h2>油温档位（中式&quot;几成热&quot;）</h2>\n<p>详见 <a href=\"../../../data/oil-temp-tiers.yaml\">data/oil-temp-tiers.yaml</a>。</p>\n<table>\n<thead>\n<tr>\n<th>ID</th>\n<th>中文</th>\n<th>°C</th>\n<th>视觉</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>1-2-cheng</td>\n<td>一二成热</td>\n<td>30–60</td>\n<td>静止无气泡</td>\n</tr>\n<tr>\n<td>3-4-cheng</td>\n<td>三四成热</td>\n<td>90–120</td>\n<td>筷子周围小泡</td>\n</tr>\n<tr>\n<td>5-6-cheng</td>\n<td>五六成热</td>\n<td>150–180</td>\n<td>密集小泡微烟</td>\n</tr>\n<tr>\n<td>7-8-cheng</td>\n<td>七八成热</td>\n<td>200–220</td>\n<td>大波动明显烟</td>\n</tr>\n<tr>\n<td>9-cheng</td>\n<td>九成热</td>\n<td>230+</td>\n<td>浓烟近燃点（仅秒级）</td>\n</tr>\n</tbody></table>\n<p>每个 SOP 用 <code>heat_level_used</code> 引用火候档位，避免&quot;中火&quot;的模糊性。</p>\n","lang":"zh"},"zh/start/pantry-layers":{"title":"储藏分层 / Pantry layers (L0–L4)","html":"<h1>储藏分层 / Pantry layers (L0–L4)</h1>\n<pre><code class=\"language-text\">L0  Hardware              data/hardware.yaml + hardware-extensions.yaml\nL1  Base ingredients      data/ingredients.yaml         (常温/冷藏，high-frequency)\nL2  Fresh aromatics       data/fresh-aromatics.yaml     (按需买，short shelf life)\nL3  Base condiments       data/condiments.yaml          (大瓶常备)\nL4  Dry pantry            data/dry-pantry.yaml          (整香料 + 粉香料 + 干鲜)\n─────────────────────────────────────────\nL5  Pre-packed SKUs       data/sku/{dry,wet,cooked,soup,ready}.yaml\nL6  SOPs                  data/sop.yaml\nL7  Dishes (composition)  data/dishes.yaml\n</code></pre>\n<p>L0–L4 是 <strong>采购对象</strong>：你直接买这些。\nL5–L7 是 <strong>AI 协助构造对象</strong>：通过 add-dish skill 渐增。</p>\n<h2>每层的采购模式</h2>\n<p>每个 L1–L4 条目带 <code>procurement_mode</code>:</p>\n<table>\n<thead>\n<tr>\n<th>Mode</th>\n<th>含义</th>\n<th>例子</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>bulk_pantry</code></td>\n<td>常备大量</td>\n<td>盐、生抽、米、蒜、葱</td>\n</tr>\n<tr>\n<td><code>seasonal_buy</code></td>\n<td>阶段性大批量</td>\n<td>masala、整香料、特色酱</td>\n</tr>\n<tr>\n<td><code>on_demand_online</code></td>\n<td>按需小量网购</td>\n<td>柠檬汁、香茅、南姜</td>\n</tr>\n</tbody></table>\n<h2>中国电商优势</h2>\n<p>L1 食材里很多有 <code>cn_market_pre_prepped[]</code> 字段：列出当地生鲜电商已经处理好的形态（排骨切块、鸡腿剔骨、白萝卜切丝）。</p>\n<p>→ 这就是 LK 敢锁 10 件套硬件的底气：<strong>切菜外包给电商</strong>，硬件只承担&quot;煮 + 炒 + 量&quot;的核心。</p>\n","lang":"zh"},"zh/start/philosophy":{"title":"理念 / Philosophy","html":"<h1>理念 / Philosophy</h1>\n<blockquote>\n<p>让人类拥有世界舌头！</p>\n</blockquote>\n<p>懒蛋厨房不是菜谱网站。它是一个<strong>结构化、AI 化、硬件极简、时间最优</strong>的厨房操作系统。</p>\n<h2>五条核心信念</h2>\n<h3>1. 内容是产品，网站只是查看皮肤</h3>\n<p>所有真知识在 <code>data/*.yaml</code>。网站 HTML 只是把 yaml 渲染成人类好读的样子。\n你 clone 仓库 → 双击 <code>lazy-kitchen.html</code> → 离线、零依赖看完整手册。</p>\n<h3>2. AI 不在仓库里跑</h3>\n<p>仓库没有任何 LLM 客户端、没有 API key、没有服务器代码。\nAI 在你本机的 CLI 里跑（Claude Code / Cline + DeepSeek / Codex / Gemini / Aider）。\n仓库只放<strong>指令</strong> (<code>skills/add-dish/workflow.md</code>) 和<strong>契约</strong> (<code>schemas/*.json</code>)。</p>\n<h3>3. 硬件极简到 10 件</h3>\n<p>主厨刀 + 中式菜刀 + 炒锅 + 汤锅 + 量勺 + 厨房秤 + 真空封袋器 + 真空袋 + 茶包袋 + 冷冻标签。\n<strong>就这些。</strong>\n任何菜需要烤箱 / 电饭煲 / 空气炸锅 / 料理机，必须显式标注 <code>hardware_extension</code>。\n能极简，是因为中国生鲜电商能买到切好的肉、剔骨的鸡腿。</p>\n<h3>4. 时间双轨：动手时间 vs 闲置时间</h3>\n<p>每道菜带 <code>hands_on_min</code> + <code>unattended_min</code>。\n<strong>懒的核心不是总时间短，而是动手时间短。</strong>\n4 小时炖牛腩（15 分钟动手）比 30 分钟全程紧张的快炒更&quot;懒&quot;。</p>\n<h3>5. 人是审美主导，AI 是劳动力</h3>\n<p>maintainer 用 add-dish skill 起草 → AI 跨家族二审 → 推到告示栏 → 社区投票评论 → 共识后正式发布。\n不让 AI 决定品味，但用 AI 加速执行。</p>\n<h2>不做什么</h2>\n<ul>\n<li>不做账号系统（GitHub 账号即身份）</li>\n<li>不做评论数据库（GitHub Discussions / Giscus）</li>\n<li>不做后端（CF Pages 纯静态）</li>\n<li>不做&quot;网红营销&quot;（让食物本身说话）</li>\n<li>不做烘焙（v2 单独项目）</li>\n<li>不做&quot;低糖低脂版&quot;标签（哪种饮食流派都不偏向）</li>\n</ul>\n<h2>不预制什么</h2>\n<ul>\n<li>基础食材（鸡蛋、豆腐、洋葱）—— 留人参与感</li>\n<li>生鲜香草（香菜、薄荷、青柠）—— 当天用最香</li>\n<li>切菜本身（生鲜电商代劳）</li>\n</ul>\n<h2>预制什么</h2>\n<ul>\n<li>干香料组合（DRY 包，常温保存数月）</li>\n<li>湿酱腌料（WET 包，真空冷冻数月）</li>\n<li>熟底（COOKED 块，冷冻几周）</li>\n<li>汤底（SOUP 浓缩，冷冻数月）</li>\n<li>即食热食（READY，备餐场景）</li>\n</ul>\n<h2>一句话</h2>\n<p><strong>Ingredient + Flavor SKU + SOP = Meal.</strong></p>\n<p>让一周做饭从&quot;30 个决策 × 7 天&quot; 简化为&quot;3 次大决策 + 5 分钟取出加热组装&quot;。</p>\n","lang":"zh"},"zh/start/safety":{"title":"食品安全 / Food safety","html":"<h1>食品安全 / Food safety</h1>\n<p>LK 对食安的态度：<strong>说清楚风险，不当无菌室。</strong></p>\n<h2>关键风险点</h2>\n<h3>真空袋 &amp; 真空封袋器</h3>\n<ul>\n<li>必须 <strong>BPA-free 食品级</strong>（详见 <a href=\"#/zh/buy/consumables-guide\">HW-VACUUM-BAGS</a>）</li>\n<li>已用包装 <strong>不可二次封</strong>（交叉污染）</li>\n<li>微波加热 → 不可（高温析出）</li>\n<li>冷冻 + 沸水加热 → 可（看耐温标）</li>\n</ul>\n<h3>真空冷冻肉类</h3>\n<ul>\n<li>推荐 -18°C 以下</li>\n<li>风味期 6–12 个月</li>\n<li>安全期 24 个月+</li>\n<li>解冻：冷藏过夜 &gt; 流水 &gt; 微波（按推荐排序）</li>\n<li><strong>化冻后不可再冻</strong></li>\n</ul>\n<h3>湿酱 (WET SKU)</h3>\n<ul>\n<li>含蒜 / 含鲜葱的湿酱：<strong>必须冷冻</strong>，冷藏不超过 3 天</li>\n<li>高酸湿酱（vinaigrette / nuoc cham）冷藏可 2 周</li>\n<li>无水油基湿酱（chimichurri）冷藏 2 周</li>\n</ul>\n<h3>熟底 (COOKED SKU)</h3>\n<ul>\n<li>先彻底冷却（≤ 2 小时降到室温） → 真空 → 冷冻</li>\n<li>不要直接热包入袋（凝结水珠加速变质）</li>\n<li>一次解冻只用一份；解冻量不要超过 1 周用量</li>\n</ul>\n<h3>湿热环境（厨房）</h3>\n<ul>\n<li>砧板：<strong>生熟分离</strong>（推荐 2 块，颜色区分）</li>\n<li>切完生肉的刀必须立刻洗</li>\n<li>抹布每天换新（霉菌温床）</li>\n</ul>\n<h3>香料</h3>\n<ul>\n<li>整香料密封避光，3 年内风味好</li>\n<li>粉香料 6–12 个月开始走味</li>\n<li>受潮结块的粉香料：扔掉（霉菌风险高）</li>\n</ul>\n<h2>标签规范</h2>\n<p>冷冻包装必须标:</p>\n<pre><code>[名称]  [日期]  [批次]  [推荐使用前]\nWET-PH-ADOBO-v1\n2026-04-25\nbatch B-2026-04\nuse by 2027-04-25\n</code></pre>\n<p>详见 SOP-LABELING-001（在 add-dish 时会被引用）。</p>\n<h2>出问题怎么办</h2>\n<ul>\n<li>真空包鼓气 → 立即扔（厌氧菌）</li>\n<li>异味 / 变色 → 不冒险，扔</li>\n<li>拿不准 → 扔比试更便宜</li>\n</ul>\n<p>LK 不替你承担食安责任。所有数据带&quot;建议&quot;性质，落实你自己看判断。</p>\n","lang":"zh"},"zh/start/workflow":{"title":"使用循环 / Workflow","html":"<h1>使用循环 / Workflow</h1>\n<p>LK 的灵魂不是&quot;看菜谱做饭&quot;，而是这个 <strong>4 阶段循环</strong>。第一天就理解节奏，后续越用越省心。</p>\n<h2>阶段图</h2>\n<pre><code class=\"language-text\">┌─────────────────────────────────────────────────────────┐\n│                    周期开始                              │\n├─────────────────────────────────────────────────────────┤\n│  ① 计划期（10 分钟）                                     │\n│     浏览 dish 库，按 hands_on_min 升序挑这周想吃的       │\n│     输出：菜单清单                                       │\n├─────────────────────────────────────────────────────────┤\n│  ② 采购期（一次性，1–2 小时）                            │\n│     a) 硬件 / 耗材：缺啥按 buying_guide 配齐             │\n│     b) 阶段性大批量：按 SKU.ingredients 列表统采少用调料 │\n│     c) 按需小量：on_demand_online 食材在生鲜电商下单     │\n├─────────────────────────────────────────────────────────┤\n│  ③ 制备期（一次性，半天）                                │\n│     按 SKU 公式混合干料 → 茶包袋 → 真空袋 → 标签         │\n│     湿酱按 WET SKU SOP 做 → 分装真空 → 冷冻              │\n│     熟底按 COOKED SKU SOP 做 → 冷冻成块 → 真空           │\n├─────────────────────────────────────────────────────────┤\n│                    每天循环                              │\n├─────────────────────────────────────────────────────────┤\n│  ④ 执行期（每餐 15–30 分钟 hands_on）                    │\n│     生鲜电商买当天预切肉/菜（CN 市场预处理）             │\n│     从冰箱取一个预制 SKU + 配套 SOP                      │\n│     按 SOP 步骤组装 → 上桌                               │\n└─────────────────────────────────────────────────────────┘\n</code></pre>\n<h2>关键观念三件事</h2>\n<h3>1. ②③ 是低频高投入</h3>\n<p>一次买齐、一次做完，省下后面所有重复劳动。\n这是 LK 模块化论点的人话表达。</p>\n<h3>2. ④ 是高频低投入</h3>\n<p>因为 ②③ 已经做过，每天只需&quot;取 + 加热 + 切肉 + 端&quot;。\n这就是&quot;懒&quot;的兑现。</p>\n<h3>3. 采购的三种节奏</h3>\n<table>\n<thead>\n<tr>\n<th>节奏</th>\n<th>例子</th>\n<th>怎么标</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>常备</td>\n<td>盐、生抽、米、蒜、葱</td>\n<td><code>procurement_mode: bulk_pantry</code></td>\n</tr>\n<tr>\n<td>阶段大量</td>\n<td>masala、特色酱、整香料</td>\n<td><code>procurement_mode: seasonal_buy</code></td>\n</tr>\n<tr>\n<td>按需小量</td>\n<td>柠檬汁、香茅、南姜</td>\n<td><code>procurement_mode: on_demand_online</code></td>\n</tr>\n</tbody></table>\n<p><code>add-dish</code> skill 在生成新菜时会主动询问每个不在 glossary 的食材属于哪种节奏。</p>\n<h2>周期建议</h2>\n<table>\n<thead>\n<tr>\n<th>厨房状态</th>\n<th>推荐周期长度</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>新建 LK 厨房</td>\n<td>第 1 周做 ③ 一次，准备 3–4 个 DRY 包 + 1 个 COOKED</td>\n</tr>\n<tr>\n<td>稳定运行</td>\n<td>每 2–4 周做 ③ 一次，补充消耗的包</td>\n</tr>\n<tr>\n<td>旅行回来</td>\n<td>周日花半天做 ③，整周 ④ 都轻松</td>\n</tr>\n</tbody></table>\n<h2>不要走样</h2>\n<ul>\n<li>不要每天都做 ②③（那就回到了&quot;每顿现做&quot;模式）</li>\n<li>不要 ④ 时还从零切香料（动手时间会爆涨）</li>\n<li>不要把 ② 拆成&quot;每天网购小量&quot;（那会回到忙碌循环）</li>\n</ul>\n<h2>反 LK 的反例</h2>\n<p><strong>反例 1</strong>：周三晚上 7 点开始想&quot;今晚吃啥&quot;，去看菜谱网站，决定做某道复杂菜，9 点才开吃。\nLK 反对：周日就该决定本周菜单 + 备好包。</p>\n<p><strong>反例 2</strong>：每次做菜都从整株蒜开始剥皮、整块姜开始切片。\nLK 反对：蒜末/姜末可以批量切完冷冻；或用预制 SKU 包里已经处理好的版本。</p>\n<p><strong>反例 3</strong>：同一个香料柜里堆着 50 种小料瓶子，但 80% 一年只用 1–2 次。\nLK 反对：少买偏门小料；如果 30 道菜里只有 1 道用，要么省略，要么按需小量网购。</p>\n","lang":"zh"},"zh/cover":{"title":"懒蛋厨房","html":"<div class=\"section-header\">\n    <div class=\"section-header__eyebrow\">🍳 懒蛋厨房 · v0.1</div>\n    <h1 class=\"section-header__title\">让人类拥有世界舌头！</h1>\n    <p class=\"section-header__intro\">结构化、AI 化、硬件极简、时间最优的厨房操作系统。静态站点 + 可移植 CLI skill — 无后端、无账户、不折腾。</p>\n  </div>\n\n  <div class=\"grid-4\" style=\"margin-top:48px\">\n    <div class=\"stat-card\">\n      <div class=\"stat-card__num\">10</div>\n      <div class=\"stat-card__label\">硬件</div>\n      <div class=\"stat-card__sub\">锁死的 10 件套</div>\n    </div>\n    <div class=\"stat-card\">\n      <div class=\"stat-card__num\">62</div>\n      <div class=\"stat-card__label\">设计 tokens</div>\n      <div class=\"stat-card__sub\">变量 + 8 文字样式</div>\n    </div>\n    <div class=\"stat-card\">\n      <div class=\"stat-card__num\">1+60</div>\n      <div class=\"stat-card__label\">菜品</div>\n      <div class=\"stat-card__sub\">1 已发布 + 60 计划中</div>\n    </div>\n    <div class=\"stat-card\">\n      <div class=\"stat-card__num\">Static</div>\n      <div class=\"stat-card__label\">后端</div>\n      <div class=\"stat-card__sub\">无服务器、无账户、无数据库。</div>\n    </div>\n  </div>\n\n  <h2>三种用法</h2>\n  <div class=\"grid-3\">\n    <div class=\"stat-card\">\n      <div style=\"font-size:32px;font-weight:700;color:var(--color-accent-hover)\">A.</div>\n      <div class=\"stat-card__label\">看手册</div>\n      <div class=\"stat-card__sub\">双击 lazy-kitchen.html — 零安装、可离线。</div>\n    </div>\n    <div class=\"stat-card\">\n      <div style=\"font-size:32px;font-weight:700;color:var(--color-accent-hover)\">B.</div>\n      <div class=\"stat-card__label\">加新菜</div>\n      <div class=\"stat-card__sub\">CLI 调 /add-dish（中文推荐 Cline + DeepSeek）</div>\n    </div>\n    <div class=\"stat-card\">\n      <div style=\"font-size:32px;font-weight:700;color:var(--color-accent-hover)\">C.</div>\n      <div class=\"stat-card__label\">审稿</div>\n      <div class=\"stat-card__sub\">换个 CLI（Codex / Gemini）做跨家族二审。</div>\n    </div>\n  </div>","lang":"zh"},"en/cover":{"title":"Lazy Kitchen","html":"<div class=\"section-header\">\n    <div class=\"section-header__eyebrow\">🍳 LAZY KITCHEN · v0.1</div>\n    <h1 class=\"section-header__title\">Make Kitchen Great Again.</h1>\n    <p class=\"section-header__intro\">A structured, AI-curated, minimal-hardware kitchen operating system. Built as a static site + portable CLI skill — no backend, no accounts, no drama.</p>\n  </div>\n\n  <div class=\"grid-4\" style=\"margin-top:48px\">\n    <div class=\"stat-card\">\n      <div class=\"stat-card__num\">10</div>\n      <div class=\"stat-card__label\">MVP hardware</div>\n      <div class=\"stat-card__sub\">The locked 10-piece kit</div>\n    </div>\n    <div class=\"stat-card\">\n      <div class=\"stat-card__num\">62</div>\n      <div class=\"stat-card__label\">Design tokens</div>\n      <div class=\"stat-card__sub\">Variables + 8 text styles</div>\n    </div>\n    <div class=\"stat-card\">\n      <div class=\"stat-card__num\">1+60</div>\n      <div class=\"stat-card__label\">Dishes</div>\n      <div class=\"stat-card__sub\">1 approved + 60 planned</div>\n    </div>\n    <div class=\"stat-card\">\n      <div class=\"stat-card__num\">Static</div>\n      <div class=\"stat-card__label\">Backend</div>\n      <div class=\"stat-card__sub\">No server. No accounts. No DB.</div>\n    </div>\n  </div>\n\n  <h2>Three ways to use this repo</h2>\n  <div class=\"grid-3\">\n    <div class=\"stat-card\">\n      <div style=\"font-size:32px;font-weight:700;color:var(--color-accent-hover)\">A.</div>\n      <div class=\"stat-card__label\">Read manual</div>\n      <div class=\"stat-card__sub\">Double-click lazy-kitchen.html. Zero install. Works offline.</div>\n    </div>\n    <div class=\"stat-card\">\n      <div style=\"font-size:32px;font-weight:700;color:var(--color-accent-hover)\">B.</div>\n      <div class=\"stat-card__label\">Add a dish</div>\n      <div class=\"stat-card__sub\">Run /add-dish in your CLI agent (Cline + DeepSeek recommended for Chinese).</div>\n    </div>\n    <div class=\"stat-card\">\n      <div style=\"font-size:32px;font-weight:700;color:var(--color-accent-hover)\">C.</div>\n      <div class=\"stat-card__label\">Review drafts</div>\n      <div class=\"stat-card__sub\">Switch CLI (Codex/Gemini) for cross-family second-opinion audit.</div>\n    </div>\n  </div>","lang":"en"}};

    function langOf(hash) { return hash.startsWith('en/') ? 'en' : 'zh'; }
    function closeDrawer() {
      const sb = document.querySelector('.sidebar');
      if (sb) sb.classList.remove('open');
    }

    function render() {
      const hash = location.hash.slice(2) || 'zh/cover';
      const lang = langOf(hash);
      document.getElementById('topbar').innerHTML = TOPBAR[lang];
      document.getElementById('sidebar-mount').innerHTML = SIDEBAR[lang];
      // mark active sidebar link
      document.querySelectorAll('.sidebar a').forEach(a => {
        const href = a.getAttribute('href') || '';
        if (href === '#/' + hash) a.classList.add('active');
        // auto-close drawer on link tap (mobile)
        a.addEventListener('click', closeDrawer);
      });
      const page = PAGES[hash];
      const main = document.getElementById('content');
      if (page) {
        main.innerHTML = page.html;
        document.title = page.title + ' · 懒蛋厨房';
      } else {
        main.innerHTML = '<h1>404</h1><p>Page not found: <code>' + hash + '</code></p>';
      }
      window.scrollTo(0, 0);
      closeDrawer();
      // wire search
      const sIn = document.getElementById('search');
      if (sIn) sIn.addEventListener('input', (e) => doSearch(e.target.value.trim()));
    }

    // close drawer when tapping the scrim
    document.addEventListener('click', (e) => {
      const t = e.target;
      if (t && t.tagName === 'MAIN') closeDrawer();
    });

    function doSearch(q) {
      if (!q) return render();
      const norm = q.toLowerCase();
      const hits = Object.entries(PAGES).filter(([k, v]) =>
        k.toLowerCase().includes(norm) ||
        v.title.toLowerCase().includes(norm) ||
        v.html.toLowerCase().includes(norm)
      ).slice(0, 30);
      const main = document.getElementById('content');
      main.innerHTML = '<h1>Search: ' + q + '</h1><div class="grid-2">' +
        hits.map(([k, v]) => '<a class="dish-card" href="#/' + k + '"><h3 class="dish-card__title">' +
          v.title + '</h3><div class="dish-card__id">' + k + '</div></a>').join('') +
        '</div>';
    }

    window.addEventListener('hashchange', render);
    window.addEventListener('DOMContentLoaded', render);
  </script>
