<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#2C2E33" />
  <title>懒蛋厨房 / Lazy Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" />
  <style>/* 懒蛋厨房 / Lazy Kitchen — production CSS v0.2
 * Mirrors Figma design system file WKCKghfPr2XXsJIovE7Azo.
 * Tokens, then atoms, molecules, organisms, layout.
 */

/* ============ TOKENS ============ */
:root {
  /* primitives */
  --yolk-100:#fef6d6; --yolk-200:#fde79b; --yolk-300:#fbd866; --yolk-400:#f6c845;
  --yolk-500:#F4C430; --yolk-600:#d9a800; --yolk-700:#b88800; --yolk-800:#856200; --yolk-900:#5a4500;
  --slate-100:#e8e8e3; --slate-200:#d4d4ce; --slate-300:#a8a8a3; --slate-400:#777a82;
  --slate-500:#5a5d65; --slate-600:#44464d; --slate-700:#3a3d45; --slate-800:#232428; --slate-900:#2C2E33;
  --ivory-100:#fafaf7; --paper-200:#f3f1eb; --paper-300:#e5e2d6;
  --status-draft:#9ca3af; --status-proposed:#F4C430; --status-review:#fde79b;
  --status-approved:#22c55e; --status-deprecated:#6b7280;

  /* semantic — Light */
  --color-bg-page: var(--ivory-100);
  --color-bg-sidebar: var(--paper-200);
  --color-bg-topbar: var(--slate-900);
  --color-bg-card: var(--ivory-100);
  --color-bg-code: var(--slate-900);
  --color-bg-inline-code: var(--paper-200);
  --color-text-primary: var(--slate-900);
  --color-text-secondary: var(--slate-700);
  --color-text-muted: var(--slate-500);
  --color-text-on-accent: var(--slate-900);
  --color-text-on-dark: var(--ivory-100);
  --color-border-default: var(--paper-300);
  --color-border-strong: var(--slate-300);
  --color-accent: var(--yolk-500);
  --color-accent-hover: var(--yolk-600);
  --color-link: var(--yolk-700);

  /* spacing */
  --spacing-xs:4px; --spacing-sm:8px; --spacing-md:12px; --spacing-lg:16px;
  --spacing-xl:24px; --spacing-2xl:32px; --spacing-3xl:48px; --spacing-4xl:64px;
  /* radius */
  --radius-sm:3px; --radius-md:5px; --radius-lg:8px; --radius-xl:12px; --radius-full:9999px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-bg-page: var(--slate-900);
    --color-bg-sidebar: var(--slate-800);
    --color-bg-topbar: var(--slate-800);
    --color-bg-card: var(--slate-800);
    --color-bg-code: var(--slate-800);
    --color-bg-inline-code: var(--slate-700);
    --color-text-primary: var(--ivory-100);
    --color-text-secondary: var(--slate-300);
    --color-text-muted: var(--slate-400);
    --color-border-default: var(--slate-700);
    --color-border-strong: var(--slate-600);
    --color-accent-hover: var(--yolk-400);
    --color-link: var(--yolk-400);
  }
}

/* ============ RESETS + TYPE ============ */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  /* Latin first (Inter), then preferred CJK in priority order. Browser picks per-glyph.
     Order: macOS → Huawei → Xiaomi → Adobe/Google open source → Windows newer/older */
  font-family:
    'Inter', -apple-system, BlinkMacSystemFont,
    'PingFang SC', 'Hiragino Sans GB',
    'HarmonyOS Sans SC', 'MiSans', 'OPPOSans',
    'Source Han Sans SC', 'Source Han Sans CN', 'Noto Sans SC',
    'Microsoft YaHei UI', 'Microsoft YaHei',
    'Segoe UI', sans-serif;
  background: var(--color-bg-page);
  color: var(--color-text-primary);
  line-height: 1.55;       /* tighter than 1.6 — CJK reads better at 1.5–1.6 */
  font-size: 15.5px;       /* slightly smaller — Chinese chars are visually denser */
  letter-spacing: 0.01em;  /* tiny breathing room for CJK */
  font-feature-settings: 'tnum', 'palt';  /* tabular nums + proportional CJK */
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Latin-only contexts (codes, IDs, monospace) — fix font-feature for ASCII */
code, .topbar__brand, .dish-card__id, .dish-card__sku-id,
.term-card__category, .formula__sep, .step__num, .stat-card__num,
.time-card__num {
  font-feature-settings: 'tnum';
}

/* Headings — slightly tighter for Chinese */
h1, h2, h3, h4, h5, h6 { line-height: 1.3; letter-spacing: 0; }

/* ============ ATOMS ============ */
.chip {
  display:inline-flex; align-items:center; gap:6px;
  padding:3px 8px; border-radius:var(--radius-sm);
  font-size:11px; font-weight:500;
}
.chip--strong  { background:var(--color-accent); color:var(--color-text-on-accent); font-weight:600; }
.chip--default { background:var(--color-bg-inline-code); color:var(--color-text-secondary); }
.chip--outline { background:transparent; color:var(--color-text-primary);
                 border:1px solid var(--color-border-default); }
.chip--inverse { background:var(--slate-800); color:var(--color-text-on-dark); }

.status-badge {
  display:inline-flex; align-items:center;
  padding:3px 9px; border-radius:var(--radius-full);
  font-size:10px; font-weight:600;
  letter-spacing:0.06em; text-transform:uppercase;
}
.status-badge--draft      { background:var(--status-draft);      color:var(--color-text-on-dark); }
.status-badge--proposed   { background:var(--status-proposed);   color:var(--color-text-on-accent); }
.status-badge--review     { background:var(--status-review);     color:var(--color-text-on-accent); }
.status-badge--approved   { background:var(--status-approved);   color:var(--color-text-on-dark); }
.status-badge--deprecated { background:var(--status-deprecated); color:var(--color-text-on-dark); }
.status-badge--planned    { background:var(--status-draft);      color:var(--color-text-on-dark); }

.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:10px 16px; border-radius:var(--radius-md);
  font-size:14px; font-weight:600; text-decoration:none;
  border:1px solid transparent; cursor:pointer;
}
.btn--primary   { background:var(--color-accent); color:var(--color-text-on-accent); }
.btn--secondary { background:transparent; color:var(--color-text-primary);
                  border-color:var(--color-border-default); }

.search {
  display:inline-flex; align-items:center; gap:var(--spacing-sm);
  padding:8px 14px;
  background:var(--color-bg-card); border:1px solid var(--color-border-default);
  border-radius:var(--radius-md); width:100%; max-width:360px;
}
.search input { flex:1; background:transparent; border:0; outline:0; font:inherit; color:inherit; }
.search input::placeholder { color:var(--color-text-muted); }
.search-kbd {
  padding:2px 6px; border-radius:var(--radius-sm);
  background:var(--color-bg-inline-code);
  font-size:11px; color:var(--color-text-muted);
}

/* ============ MOLECULES ============ */
.section-header { display:flex; flex-direction:column; gap:var(--spacing-md); }
.section-header__eyebrow {
  font-size:12px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--color-text-muted);
}
.section-header__title { font-size:40px; line-height:1.1; font-weight:700;
                         color:var(--color-text-primary); margin:0; }
.section-header__intro { font-size:16px; line-height:1.6; color:var(--color-text-secondary); margin:0; }

.stat-card {
  display:flex; flex-direction:column; gap:var(--spacing-sm);
  padding:var(--spacing-xl);
  background:var(--color-bg-card); border:1px solid var(--color-border-default);
  border-radius:var(--radius-lg);
}
.stat-card__num   { font-size:32px; font-weight:700; line-height:1.1; color:var(--color-text-primary); }
.stat-card__label { font-size:13px; font-weight:600; color:var(--color-text-secondary); }
.stat-card__sub   { font-size:12px; line-height:1.45; color:var(--color-text-muted); }
.stat-card--approved .stat-card__num { color:var(--status-approved); }
.stat-card--proposed .stat-card__num { color:var(--color-accent-hover); }
.stat-card--muted    .stat-card__num { color:var(--color-text-muted); }

.step { display:flex; gap:var(--spacing-lg); align-items:flex-start; }
.step__num {
  flex:0 0 28px; height:28px;
  display:inline-flex; align-items:center; justify-content:center;
  border-radius:var(--radius-full);
  background:var(--color-accent); color:var(--color-text-on-accent);
  font-weight:700; font-size:13px;
}
.step__body { display:flex; flex-direction:column; gap:4px; }
.step__heading { font-weight:600; font-size:14px; color:var(--color-text-primary); }
.step__text    { font-size:13px; line-height:1.6; color:var(--color-text-secondary); }

.spec-row { display:flex; flex-direction:column; gap:4px; }
.spec-row__label { font-size:10px; font-weight:600; letter-spacing:0.06em;
                   text-transform:uppercase; color:var(--color-text-muted); }
.spec-row__value { font-size:14px; font-weight:500; color:var(--color-text-primary); }

.filter-pill {
  display:inline-flex; align-items:center;
  padding:6px 12px; border-radius:var(--radius-md);
  border:1px solid var(--color-border-default);
  background:var(--color-bg-card); color:var(--color-text-secondary);
  font-size:12px; font-weight:500; text-decoration:none; cursor:pointer;
}
.filter-pill.active {
  background:var(--color-accent); border-color:var(--color-accent);
  color:var(--color-text-on-accent); font-weight:600;
}

/* ============ ORGANISMS ============ */
.topbar { position:sticky; top:0; z-index:50; border-bottom:3px solid var(--color-accent); }
.topbar__inner {
  display:flex; align-items:center; gap:var(--spacing-xl);
  padding:14px var(--spacing-xl);
  background:var(--color-bg-topbar); color:var(--color-text-on-dark);
}
.topbar__brand { font-weight:700; font-size:16px; letter-spacing:0.06em; }
.topbar__tag   { font-size:13px; opacity:0.5; }
.topbar__spacer { flex:1; }
.topbar .lang-switch { display:inline-flex; align-items:center; gap:6px; }
.topbar .lang-switch a { text-decoration:none; font-size:13px;
                          color:var(--color-text-on-dark); opacity:0.7; }
.topbar .lang-switch a.active { color:var(--color-accent); font-weight:600; opacity:1; }
.topbar .lang-switch .sep { opacity:0.4; }
.topbar .search { background:var(--slate-800); border-color:var(--slate-700); width:280px; }
.topbar .search input { color:var(--color-text-on-dark); }
.topbar .search input::placeholder { color:var(--color-text-on-dark); opacity:0.5; }
.topbar .search-kbd { background:var(--slate-700); color:var(--color-text-on-dark); opacity:0.7; }
.topbar__hamburger { display:none; font-size:18px; cursor:pointer; }
@media (max-width:768px){
  .topbar__inner { gap:var(--spacing-md); padding:14px var(--spacing-lg); }
  .topbar__brand { font-size:14px; }
  .topbar__tag, .topbar .search, .topbar .lang-switch { display:none; }
  .topbar__hamburger { display:inline-block; }
}

.sidebar {
  background:var(--color-bg-sidebar);
  border-right:1px solid var(--color-border-default);
  padding:var(--spacing-xl) var(--spacing-lg);
  overflow-y:auto; font-size:14px;
}
.sidebar h3 {
  font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--color-text-muted);
  margin:var(--spacing-xl) 0 var(--spacing-xs); padding:0;
}
.sidebar h3:first-child { margin-top:0; }
.sidebar ul { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:2px; }
.sidebar a {
  display:block; padding:6px 8px; border-radius:var(--radius-sm);
  text-decoration:none; color:var(--color-text-primary); font-size:13px;
}
.sidebar a:hover  { background:var(--color-bg-inline-code); }
.sidebar a.active { background:var(--color-accent); color:var(--color-text-on-accent); font-weight:600; }

.dish-card {
  display:flex; flex-direction:column; gap:var(--spacing-md);
  padding:20px var(--spacing-xl);
  background:var(--color-bg-card); border:1px solid var(--color-border-default);
  border-radius:var(--radius-lg);
  text-decoration:none; color:inherit;
}
.dish-card:hover { border-color:var(--color-accent); }
.dish-card__top { display:flex; align-items:center; gap:6px; }
.dish-card__id  { font-family:ui-monospace,monospace; font-size:11px;
                  color:var(--color-text-muted); margin-left:auto; }
.dish-card__title { font-size:18px; font-weight:700; line-height:1.3; color:var(--color-text-primary); margin:0; }
.dish-card__subtitle { font-size:13px; line-height:1.45; color:var(--color-text-secondary); margin:0; }
.dish-card__meta { display:flex; align-items:baseline; gap:var(--spacing-lg); }
.dish-card__time { font-size:22px; font-weight:700; color:var(--color-accent-hover); }
.dish-card__time-unit { font-size:11px; font-weight:500; color:var(--color-text-muted); }
.dish-card__tags { display:flex; gap:6px; flex-wrap:wrap; }
.dish-card__divider { height:1px; background:var(--color-border-default); }
.dish-card__sku { display:flex; align-items:center; gap:6px; }
.dish-card__sku-label { font-size:10px; font-weight:500; letter-spacing:0.06em;
                        text-transform:uppercase; color:var(--color-text-muted); }
.dish-card__sku-id    { font-family:ui-monospace,monospace; font-size:11px; color:var(--color-link); }

.formula {
  display:flex; flex-direction:column; gap:var(--spacing-lg);
  padding:var(--spacing-xl);
  background:var(--color-bg-card); border:1px solid var(--color-border-default);
  border-radius:var(--radius-lg);
}
.formula__label { font-size:11px; font-weight:600; letter-spacing:0.06em;
                  text-transform:uppercase; color:var(--color-text-muted); }
.formula__row { display:flex; flex-wrap:wrap; align-items:center; gap:var(--spacing-md); }
.formula__row .chip { padding:8px 14px; font-size:12px; }
.formula__sep { font-size:16px; font-weight:700; color:var(--color-text-muted); }

.time-card {
  display:flex; flex-direction:column; gap:var(--spacing-md);
  padding:var(--spacing-xl);
  background:var(--color-bg-card); border:1px solid var(--color-border-default);
  border-radius:var(--radius-lg);
}
.time-card__label { font-size:11px; font-weight:600; letter-spacing:0.06em;
                    text-transform:uppercase; color:var(--color-text-muted); }
.time-card__big { display:flex; align-items:baseline; gap:var(--spacing-sm); }
.time-card__num { font-size:56px; font-weight:700; line-height:1; color:var(--color-accent-hover); }
.time-card__unit { font-size:14px; font-weight:500; color:var(--color-text-primary); }
.time-card__breakdown { font-size:13px; line-height:1.6; color:var(--color-text-secondary); }

.flavor {
  display:flex; flex-direction:column; gap:var(--spacing-md);
  padding:var(--spacing-xl);
  background:var(--color-bg-card); border:1px solid var(--color-border-default);
  border-radius:var(--radius-lg);
}
.flavor__label { font-size:11px; font-weight:600; letter-spacing:0.06em;
                 text-transform:uppercase; color:var(--color-text-muted); }
.flavor__row { display:flex; gap:var(--spacing-md); align-items:baseline; }
.flavor__key { width:50px; font-weight:600; font-size:13px; color:var(--color-accent-hover); }
.flavor__value { font-size:13px; color:var(--color-text-primary); }

.ingredients {
  background:var(--color-bg-card); border:1px solid var(--color-border-default);
  border-radius:var(--radius-lg); overflow:hidden;
}
.ingredients__row {
  display:grid; grid-template-columns:220px 120px 1fr; gap:var(--spacing-lg);
  padding:var(--spacing-md) var(--spacing-lg); align-items:center;
  border-top:1px solid var(--color-border-default);
}
.ingredients__row:first-child { border-top:0; }
.ingredients__name   { font-size:13px; font-weight:500; color:var(--color-text-primary); }
.ingredients__amount { font-size:13px; font-weight:600; color:var(--color-accent-hover); }
.ingredients__note   { font-size:12px; color:var(--color-text-muted); }

.sop-steps {
  display:flex; flex-direction:column; gap:var(--spacing-lg);
  padding:var(--spacing-xl);
  background:var(--color-bg-card); border:1px solid var(--color-border-default);
  border-radius:var(--radius-lg);
}
.sop-steps__label { font-size:11px; font-weight:600; letter-spacing:0.06em;
                    text-transform:uppercase; color:var(--color-text-muted); }

.tips {
  display:flex; flex-direction:column; gap:var(--spacing-md);
  padding:var(--spacing-xl);
  background:var(--color-bg-inline-code);
  border-radius:var(--radius-lg);
}
.tips__label { font-size:11px; font-weight:600; letter-spacing:0.06em;
               text-transform:uppercase; color:var(--color-accent-hover); }
.tips__item  { font-size:13px; line-height:1.6; color:var(--color-text-primary); }
.tips__item::before { content:'· '; }

.crossref {
  display:flex; flex-direction:column; gap:var(--spacing-md);
  padding:20px var(--spacing-xl);
  background:var(--color-bg-card); border:1px solid var(--color-border-default);
  border-radius:var(--radius-lg);
}
.crossref__label { font-size:11px; font-weight:600; letter-spacing:0.06em;
                   text-transform:uppercase; color:var(--color-text-muted); }
.crossref__link  { display:block; text-decoration:none;
                   font-size:13px; font-weight:500; color:var(--color-link); }
.crossref__link::before { content:'→ '; }

.term-card {
  display:flex; flex-direction:column; gap:var(--spacing-sm);
  padding:var(--spacing-lg) 20px;
  background:var(--color-bg-card); border:1px solid var(--color-border-default);
  border-radius:var(--radius-lg);
}
.term-card.pitfall { border-left:4px solid var(--color-accent); }
.term-card__top { display:flex; align-items:center; gap:6px; }
.term-card__category {
  padding:2px 6px; border-radius:var(--radius-sm);
  background:var(--color-bg-inline-code);
  font-size:9px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--color-text-muted);
}
.term-card__warn {
  margin-left:auto;
  font-size:9px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--color-accent-hover);
}
.term-card__zh { font-size:18px; font-weight:700; color:var(--color-text-primary); }
.term-card__en { font-size:14px; font-weight:600; color:var(--color-accent-hover); }
.term-card__alias   { font-size:11px; color:var(--color-text-muted); }
.term-card__pitfall { font-size:11px; font-weight:500; color:var(--color-text-muted); }

.empty {
  display:flex; flex-direction:column; gap:6px; align-items:center;
  padding:var(--spacing-3xl) var(--spacing-2xl);
  background:var(--color-bg-inline-code);
  border-radius:var(--radius-lg);
  text-align:center;
}
.empty__title { font-size:14px; font-weight:600; color:var(--color-text-secondary); }
.empty__sub   { font-size:13px; color:var(--color-text-muted); }

/* ============ LAYOUT ============ */
.layout { display:grid; grid-template-columns:260px 1fr; max-width:1280px; margin:0 auto; }
.sidebar { position:sticky; top:67px; height:calc(100vh - 67px); }
main { padding:var(--spacing-3xl) var(--spacing-4xl); max-width:960px; }

main h1 {
  font-size:32px; line-height:1.2; font-weight:700;
  color:var(--color-text-primary);
  border-bottom:3px solid var(--color-accent);
  padding-bottom:var(--spacing-sm);
  margin:var(--spacing-2xl) 0 var(--spacing-lg);
}
main h1:first-child { margin-top:0; }
main h2 { font-size:22px; font-weight:600; margin:var(--spacing-2xl) 0 var(--spacing-md); }
main h3 { font-size:16px; font-weight:600; margin:var(--spacing-xl) 0 var(--spacing-sm); }
main p, main li { font-size:15px; line-height:1.65; }
main a { color:var(--color-link); text-decoration:underline; text-underline-offset:2px; }
main code { background:var(--color-bg-inline-code); padding:2px 6px; border-radius:var(--radius-sm); font-size:0.9em; }
main pre { background:var(--color-bg-code); color:var(--color-text-on-dark);
           padding:var(--spacing-lg); border-radius:var(--radius-md);
           overflow-x:auto; font-size:13px; }
main pre code { background:transparent; padding:0; color:inherit; }
main blockquote {
  border-left:4px solid var(--color-accent);
  margin:var(--spacing-lg) 0;
  padding:var(--spacing-sm) var(--spacing-lg);
  background:var(--color-bg-inline-code);
}
main table { border-collapse:collapse; width:100%; margin:var(--spacing-lg) 0; font-size:14px; }
main th, main td { border:1px solid var(--color-border-default);
                   padding:var(--spacing-sm) var(--spacing-md); text-align:left; }
main th { background:var(--color-bg-inline-code); font-weight:600; }

footer.bottom {
  text-align:center; padding:var(--spacing-2xl) var(--spacing-lg);
  color:var(--color-text-muted); font-size:13px;
  border-top:1px solid var(--color-border-default);
}
footer.bottom a { color:var(--color-link); }

/* ============ MOBILE FIRST RESPONSIVE ============ */
@media (max-width:768px) {
  body { font-size: 15px; line-height: 1.6; }

  /* layout: sidebar becomes off-canvas drawer */
  .layout { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; top: 56px; left: 0;
    width: 280px; max-width: 85vw; height: calc(100vh - 56px);
    transform: translateX(-100%); transition: transform 0.25s ease;
    z-index: 90; box-shadow: 2px 0 12px rgba(0,0,0,0.15);
    overflow-y: auto;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar.open + main::before {
    content: ''; position: fixed; inset: 56px 0 0 0;
    background: rgba(0,0,0,0.4); z-index: 80;
  }

  /* topbar */
  .topbar__inner { padding: 12px var(--spacing-lg); gap: var(--spacing-md); }
  .topbar__brand { font-size: 13px; letter-spacing: 0.05em; }
  .topbar__hamburger {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; margin-left: -8px;
    font-size: 20px; line-height: 1;
  }

  /* main content */
  main { padding: var(--spacing-xl) var(--spacing-lg); max-width: 100%; }
  main h1 { font-size: 26px; padding-bottom: 6px; margin: var(--spacing-lg) 0 var(--spacing-md); }
  main h2 { font-size: 19px; margin: var(--spacing-xl) 0 var(--spacing-sm); }
  main h3 { font-size: 15px; }
  main p, main li { font-size: 15px; }

  /* sections */
  .section-header__title { font-size: 28px; }
  .section-header__intro { font-size: 14px; }

  /* grids collapse to 1 col on small phones, 2 on tablets */
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; gap: var(--spacing-sm); }

  /* stat card scale */
  .stat-card { padding: var(--spacing-lg); gap: 6px; }
  .stat-card__num { font-size: 24px; }
  .stat-card__label { font-size: 12px; }
  .stat-card__sub { font-size: 11px; }

  /* dish card */
  .dish-card { padding: var(--spacing-lg); gap: var(--spacing-sm); }
  .dish-card__top { flex-wrap: wrap; }
  .dish-card__id { font-size: 10px; }
  .dish-card__title { font-size: 16px; }
  .dish-card__subtitle { font-size: 12px; }
  .dish-card__time { font-size: 20px; }

  /* ingredient table single-col */
  .ingredients__row {
    grid-template-columns: 1fr auto;
    gap: var(--spacing-sm); padding: var(--spacing-sm) var(--spacing-md);
  }
  .ingredients__note { display: none; }

  /* composition formula stacks vertically */
  .formula { padding: var(--spacing-lg); }
  .formula__row { flex-direction: column; align-items: stretch; gap: var(--spacing-sm); }
  .formula__row .chip { width: 100%; justify-content: center; padding: 10px 14px; font-size: 13px; }
  .formula__sep { text-align: center; padding: 0; font-size: 14px; }

  /* time/flavor/sop card padding */
  .time-card, .flavor, .sop-steps, .tips, .crossref {
    padding: var(--spacing-lg);
  }
  .time-card__num { font-size: 44px; }

  /* term cards */
  .term-card { padding: var(--spacing-md); }
  .term-card__zh { font-size: 16px; }
  .term-card__en { font-size: 13px; }

  /* tap-friendly */
  .sidebar a, .filter-pill, .btn { min-height: 36px; }
  main a { padding: 2px 0; }
}

@media (max-width: 480px) {
  /* extra-small phones: stack everything to single column */
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .topbar__brand { font-size: 12px; }
}

/* tablet polish */
@media (min-width: 769px) and (max-width: 1024px) {
  .layout { grid-template-columns: 220px 1fr; }
  main { padding: var(--spacing-xl) var(--spacing-2xl); }
}

/* ============ HIGH-DPI / RETINA ============ */
@media (min-resolution: 1.5dppx), (-webkit-min-device-pixel-ratio: 1.5) {
  /* Borders look chunky on retina at 1px. Use sub-pixel borders. */
  .stat-card, .dish-card, .formula, .time-card, .flavor,
  .ingredients, .sop-steps, .crossref, .term-card,
  .filter-pill, .search, .btn--secondary {
    border-width: 0.5px;
  }
  .ingredients__row { border-top-width: 0.5px; }
  .term-card.pitfall { border-left-width: 3px; }
  /* Yolk topbar strip: scale slightly */
  .topbar { border-bottom-width: 2px; }
  body { text-rendering: geometricPrecision; }
}

/* ============ LARGE SCREENS (≥1440px) ============ */
@media (min-width: 1440px) {
  .layout { max-width: 1440px; grid-template-columns: 280px 1fr; }
  main { max-width: 1040px; padding: var(--spacing-3xl) var(--spacing-4xl); }
  body { font-size: 16px; }
  main h1 { font-size: 36px; }
  .section-header__title { font-size: 44px; }
}

/* ============ 4K / 5K / ULTRA-WIDE (≥1920px) ============ */
@media (min-width: 1920px) {
  .layout { max-width: 1600px; grid-template-columns: 320px 1fr; }
  main { max-width: 1120px; padding: var(--spacing-4xl) 80px; }
  body { font-size: 17px; line-height: 1.6; }
  main h1 { font-size: 40px; }
  main h2 { font-size: 24px; }
  .section-header__title { font-size: 52px; }
  .sidebar a { font-size: 14px; padding: 7px 10px; }
  .sidebar h3 { font-size: 12px; }
  .stat-card__num { font-size: 36px; }
  .time-card__num { font-size: 64px; }
  .dish-card { padding: var(--spacing-xl) var(--spacing-2xl); }
  .dish-card__title { font-size: 20px; }
}

/* ============ EMOJI FALLBACK ============ */
.topbar__brand, .sidebar h3, .dish-card, .stat-card__label,
.empty__title, .empty__sub, h1, h2, h3 {
  font-family:
    'Inter', -apple-system, BlinkMacSystemFont,
    'PingFang SC', 'HarmonyOS Sans SC', 'MiSans',
    'Source Han Sans SC', 'Noto Sans SC',
    'Microsoft YaHei UI', 'Microsoft YaHei',
    'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji',
    sans-serif;
}

/* ============ REDUCED MOTION ============ */
@media (prefers-reduced-motion: reduce) {
  .sidebar { transition: none; }
}

/* utility */
.muted { color:var(--color-text-muted); }
.lead  { font-size:18px; color:var(--color-text-secondary); margin-top:-8px; }
.giscus-wrapper { margin-top:var(--spacing-3xl); padding-top:var(--spacing-2xl);
                  border-top:1px solid var(--color-border-default); }
.grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:var(--spacing-xl); }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--spacing-lg); }
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--spacing-lg); }
@media (max-width:768px) { .grid-2,.grid-3,.grid-4 { grid-template-columns:1fr 1fr; gap:var(--spacing-sm); } }
</style>
</head>

  <script>
    const PAGES = {"en/ai/choose-your-ai":{"title":"Choose your AI","html":"<h1>Choose your AI</h1>\n<p>LK&#39;s <code>add-dish</code> skill is <strong>model-neutral</strong> — any agentic CLI that can read files and converse can run it. But different CLI × model combos vary widely in quality per scenario.</p>\n<h2>CLI × model matrix</h2>\n<table>\n<thead>\n<tr>\n<th>CLI tool</th>\n<th>Default model</th>\n<th>DeepSeek support</th>\n<th>Chinese quality</th>\n<th>Best for</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Claude Code</td>\n<td>Claude (Anthropic)</td>\n<td>❌</td>\n<td>Good</td>\n<td>General; Anthropic users</td>\n</tr>\n<tr>\n<td>Codex CLI</td>\n<td>GPT-4 / o1</td>\n<td>❌</td>\n<td>Good</td>\n<td>OpenAI users; structured output</td>\n</tr>\n<tr>\n<td>Gemini CLI</td>\n<td>Gemini</td>\n<td>❌</td>\n<td>OK</td>\n<td>Google ecosystem</td>\n</tr>\n<tr>\n<td><strong>Cline (VS Code)</strong></td>\n<td>Any</td>\n<td>✅ Native</td>\n<td>DeepSeek excels</td>\n<td><strong>Chinese cuisine details</strong></td>\n</tr>\n<tr>\n<td><strong>Aider</strong></td>\n<td>Any</td>\n<td>✅ <code>--model deepseek/deepseek-chat</code></td>\n<td>DeepSeek excels</td>\n<td>CLI + git workflow</td>\n</tr>\n<tr>\n<td><strong>Continue.dev</strong></td>\n<td>Any</td>\n<td>✅</td>\n<td>DeepSeek excels</td>\n<td>VS Code / JetBrains</td>\n</tr>\n<tr>\n<td>Cursor</td>\n<td>Self + GPT/Claude</td>\n<td>✅</td>\n<td>Good</td>\n<td>Heavy IDE users</td>\n</tr>\n</tbody></table>\n<h2>Recommended combos</h2>\n<h3>Chinese maintainer</h3>\n<p><strong>Drafting (add-dish main flow)</strong>:</p>\n<ul>\n<li>Top: <strong>Cline + DeepSeek</strong> (Chinese cuisine accuracy)</li>\n<li>Backup: Aider + DeepSeek</li>\n</ul>\n<p><strong>Step 6 cross-CLI review</strong>:</p>\n<ul>\n<li>Top: Codex + GPT-4o (most reliable structured JSON)</li>\n<li>Backup: Gemini CLI (independent model family)</li>\n</ul>\n<p>→ &quot;DeepSeek to draft, Codex/Gemini to review&quot; is the sturdiest workflow.</p>\n<h3>International maintainer / no Chinese-detail concerns</h3>\n<ul>\n<li>Draft: Claude Code or Codex CLI</li>\n<li>Review: another (different model family)</li>\n</ul>\n<h3>Minimalist</h3>\n<p>Use one CLI only (Claude Code or Codex). Step 6 auto-degrades to Tier 3 (skip review); entry stays <code>proposed</code> but <code>cross_reviewed: false</code> until later cross-audit.</p>\n<h2>Install quick reference</h2>\n<table>\n<thead>\n<tr>\n<th>Tool</th>\n<th>Install</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Claude Code</td>\n<td><a href=\"https://claude.com/claude-code\">https://claude.com/claude-code</a></td>\n</tr>\n<tr>\n<td>Codex CLI</td>\n<td>npm per official docs</td>\n</tr>\n<tr>\n<td>Gemini CLI</td>\n<td><a href=\"https://ai.google.dev\">https://ai.google.dev</a> (CLI section)</td>\n</tr>\n<tr>\n<td>Cline</td>\n<td>VS Code marketplace, search &quot;Cline&quot;</td>\n</tr>\n<tr>\n<td>Aider</td>\n<td><code>pip install aider-chat</code></td>\n</tr>\n<tr>\n<td>Continue.dev</td>\n<td>VS Code marketplace, search &quot;Continue&quot;</td>\n</tr>\n<tr>\n<td>Cursor</td>\n<td><a href=\"https://cursor.com\">https://cursor.com</a></td>\n</tr>\n</tbody></table>\n<h2>Setting DeepSeek (Aider example)</h2>\n<pre><code class=\"language-bash\">export DEEPSEEK_API_KEY=sk-xxx\naider --model deepseek/deepseek-chat\n</code></pre>\n<p>Cline / Continue: add DeepSeek provider in settings UI.</p>\n<h2>We don&#39;t insist</h2>\n<p>All LK skills are markdown instructions, not API-dependent. Switching CLI doesn&#39;t affect the project, only your personal experience.</p>\n<p>Try a few combos, pick what feels best.</p>\n","lang":"en"},"en/ai/how-it-works":{"title":"How it works","html":"<h1>How it works</h1>\n<p>LK&#39;s AI runs entirely <strong>inside maintainer&#39;s local CLI agent</strong>. The repo stores no API keys and calls no external services.</p>\n<h2>Picture</h2>\n<pre><code class=\"language-text\">Repo (lazy-kitchen)              Maintainer&#39;s local CLI agent\n─────────────────                ─────────────────────────────\ndata/*.yaml          ◄────read───  Cline + DeepSeek\nschemas/*.json                       │\nskills/add-dish/                     ▼\n  workflow.md        ◄──instruct──  Run add-dish skill (5+1 steps)\n  examples/*.md                      │\n                                     ▼\ndocs/*.md            ◄──write────  Write drafts back to data/ + docs/\n                                     │\n                                     ▼\n                                   git push (manual)\n                                     │\n                                     ▼\n                                   CF Pages auto-deploy\n                                     │\n                                     ▼\n                                   Bulletin board auto-shows status: proposed\n</code></pre>\n<h2>5 + 1 step overview</h2>\n<p>See <code>skills/add-dish/workflow.md</code> for full detail.</p>\n<table>\n<thead>\n<tr>\n<th>Step</th>\n<th>What</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>1. Analyze</td>\n<td>Parse dish → cuisine, flavors, ingredients, technique</td>\n</tr>\n<tr>\n<td>2. Match</td>\n<td>Scan existing SKU/SOP/Ratio → confidence rating</td>\n</tr>\n<tr>\n<td>3a. use_existing</td>\n<td>Compose dish directly (existing parts suffice)</td>\n</tr>\n<tr>\n<td>3b. propose_new</td>\n<td>Draft new SKU/SOP/Ratio</td>\n</tr>\n<tr>\n<td>4. Glossary</td>\n<td>New terms → maintainer audit → append</td>\n</tr>\n<tr>\n<td>5. Validate</td>\n<td>Run 3 validation scripts → report</td>\n</tr>\n<tr>\n<td>6. Cross-CLI review</td>\n<td>Triggered by matrix; cross-family second opinion</td>\n</tr>\n</tbody></table>\n<h2>7 hard rules</h2>\n<p>The skill MUST obey:</p>\n<ol>\n<li><strong>No silent file writes</strong> (show draft each time)</li>\n<li><strong>New entries status = proposed</strong> (not draft; auto-bulletin)</li>\n<li><strong>Glossary is the terminology guardrail</strong></li>\n<li><strong>Bilingual mandatory</strong> (zh + en both filled)</li>\n<li><strong>Validation closed loop</strong> (run 3 scripts; rollback on fail)</li>\n<li><strong>No git operations</strong> (output suggested commit message)</li>\n<li><strong>No external API calls</strong> (model lives in maintainer&#39;s CLI)</li>\n</ol>\n<h2>Try it</h2>\n<p>Install an agentic CLI (recommend Cline + DeepSeek for Chinese-heavy work), then:</p>\n<pre><code class=\"language-text\">&gt; /add-dish Hongshao pork belly\n</code></pre>\n<p>The skill will interactively confirm 5 steps. First run: ~15 min. Once familiar: 5 min.</p>\n","lang":"en"},"en/ai/using-claude-code":{"title":"Using Claude Code","html":"<h1>Using Claude Code</h1>\n<p>If you use Claude Code, this repo natively supports the <code>add-dish</code> skill.</p>\n<h2>Install</h2>\n<p>See <a href=\"https://claude.com/claude-code\">https://claude.com/claude-code</a></p>\n<h2>Invoke</h2>\n<pre><code class=\"language-bash\">cd lazy-kitchen\nclaude\n</code></pre>\n<p>Then:</p>\n<pre><code class=\"language-text\">&gt; /add-dish Hongshao pork belly\n</code></pre>\n<p>Claude Code auto-loads <code>.claude/skills/add-dish/SKILL.md</code> and runs the 5+1-step interactive flow.</p>\n<h2>Common flags</h2>\n<ul>\n<li>Skip Step 6 cross-CLI review: <code>/add-dish &lt;name&gt; skip-review</code></li>\n<li>Pure local draft (don&#39;t push to bulletin board): after run, manually flip <code>status: proposed</code> back to <code>draft</code> in the yaml</li>\n<li>Batch review existing drafts: <code>/review-drafts</code> (note: not yet implemented in v1; can manually re-run add-dish Step 6 on existing yaml)</li>\n</ul>\n<h2>Claude Code limits (Chinese scenarios)</h2>\n<p>Claude Code uses Anthropic models by default; Chinese cuisine details sometimes lag DeepSeek. Suggestion:</p>\n<ul>\n<li>Chinese-heavy: switch to <a href=\"#/en/ai/choose-your-ai\">Cline + DeepSeek</a></li>\n<li>Cross-CLI review: write in Cline, then open Claude Code for the review step (using review-prompt.md)</li>\n</ul>\n<p>See <a href=\"#/en/ai/choose-your-ai\">Choose your AI</a>.</p>\n","lang":"en"},"en/board/contributing":{"title":"How to participate","html":"<h1>How to participate</h1>\n<p>Lazy Kitchen is a <strong>maintainer-led + community-built</strong> project. Whatever your cooking level, all of these are welcome.</p>\n<h2>Three ways to contribute</h2>\n<h3>A. Vote / comment via Giscus (lowest barrier)</h3>\n<p>Each dish page embeds GitHub Discussions. You can:</p>\n<ul>\n<li>👍 / 👎 one-tap vote</li>\n<li>Leave bilingual comments (&quot;This dish should use cane vinegar, not rice vinegar&quot;)</li>\n<li>See others&#39; discussion</li>\n</ul>\n<p><strong>Requirement</strong>: GitHub account login (one-time).</p>\n<h3>B. File a GitHub Issue (medium barrier)</h3>\n<p>Good for systematic feedback:</p>\n<table>\n<thead>\n<tr>\n<th>Issue type</th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Cuisine inaccurate</td>\n<td>&quot;This isn&#39;t authentic Korean ganjang gejang, no Korean would use X&quot;</td>\n</tr>\n<tr>\n<td>Wrong terminology</td>\n<td>&quot;glossary translates 老抽 fine but alias_en should add &#39;sweet dark soy&#39;&quot;</td>\n</tr>\n<tr>\n<td>Hardware requirement missed</td>\n<td>&quot;This dish actually needs an oven, hardware_extension didn&#39;t list it&quot;</td>\n</tr>\n<tr>\n<td>Time unrealistic</td>\n<td>&quot;20 min hands-on is impossible, should be 35 min&quot;</td>\n</tr>\n<tr>\n<td>Food safety risk</td>\n<td>&quot;Vacuum bag temp rating unclear, beginners might misuse&quot;</td>\n</tr>\n<tr>\n<td>Translation quality</td>\n<td>&quot;English step has ambiguity&quot;</td>\n</tr>\n</tbody></table>\n<p>→ File via the GitHub repo Issues tab.</p>\n<h3>C. Submit a GitHub PR (higher barrier)</h3>\n<p>Directly modify yaml + docs; maintainer reviews then merges. Suitable for:</p>\n<ul>\n<li>Adding a new dish (after running add-dish skill yourself)</li>\n<li>Fixing a term</li>\n<li>Improving an SOP step</li>\n<li>Adding buying_guide detail</li>\n<li>Improving translations</li>\n</ul>\n<p>PR rules:</p>\n<ul>\n<li>Must pass <code>bun run scripts/validate-data.ts</code></li>\n<li>Must pass <code>bun run scripts/lint-bilingual.ts</code></li>\n<li>Cross-CLI reviewed (ideal) or PR description explains skip reason</li>\n</ul>\n<h2>How maintainer handles feedback</h2>\n<pre><code class=\"language-text\">Discussions comment → maintainer judgement → edit yaml → push\nGitHub Issue        → maintainer triage → label / fix / close\nGitHub PR           → review → validate → merge or request changes\n</code></pre>\n<p>Response time not guaranteed. Personal project.</p>\n<h2>Limits</h2>\n<ul>\n<li>Won&#39;t accept &quot;this dish should be named XXX&quot; pure taste arguments (fork it)</li>\n<li>Won&#39;t accept &quot;add this sauce, add that sauce&quot; feature creep (violates &quot;minimal hardware&quot; principle)</li>\n<li>Won&#39;t accept &quot;build it as an App&quot; direction-change requests (it&#39;s a static site + skill)</li>\n</ul>\n<h2>Your scope</h2>\n<ul>\n<li>Fork it: add any dishes you want, mark them all approved for your own use</li>\n<li>You don&#39;t have to merge changes back to main</li>\n<li>Main repo is &quot;official Lazy Kitchen perspective&quot;; YOUR kitchen is your kitchen</li>\n</ul>\n","lang":"en"},"en/board/history":{"title":"Full history","html":"<h1>Full history</h1>\n<blockquote>\n<p>All dishes&#39; status transition history.</p>\n</blockquote>\n<p>Generated by <code>bun run scripts/build-html.ts</code> from git log + dishes.yaml status diffing.</p>\n","lang":"en"},"en/board/index":{"title":"Bulletin Board","html":"<h1>Bulletin Board</h1>\n<p>Center of LK&#39;s community-built model. All new dishes, all discussions, all iterations happen here.</p>\n<h2>Now</h2>\n<ul>\n<li>See <a href=\"#/en/board/proposed\">proposed</a> — dishes maintainer is currently testing, inviting feedback</li>\n<li>See <a href=\"#/en/board/recent\">recent</a> — dishes promoted to approved in the last 30 days</li>\n<li>See <a href=\"#/en/board/history\">history</a> — all status transitions</li>\n<li>Learn <a href=\"#/en/board/contributing\">contributing</a> — how to participate (vote, comment, Issue, PR)</li>\n</ul>\n<h2>State machine</h2>\n<pre><code class=\"language-text\">planned (roadmap placeholder)\n   ↓ maintainer runs /add-dish\nproposed (public on bulletin board, community votes)\n   ↓ consensus + cross-CLI review passes\nreview (preparing final audit)\n   ↓ maintainer final approval\napproved (officially published)\n   ↓ replaced by new version\ndeprecated\n</code></pre>\n<p>Each status maps to a colored badge on the dish page.</p>\n<h2>What you can do</h2>\n<ul>\n<li>See an interesting proposed dish → click in → vote/comment via Giscus</li>\n<li>Approved dishes also stay open to comment / improvement suggestion</li>\n<li>Want a dish nobody proposed → file an Issue asking maintainer to schedule, or fork + run skill + submit PR</li>\n</ul>\n","lang":"en"},"en/board/proposed":{"title":"Proposed","html":"<h1>Proposed</h1>\n<blockquote>\n<p>All current <code>status: proposed</code> dishes. Auto-generated from <code>data/dishes.yaml</code> by <code>bun run scripts/build-html.ts</code>.</p>\n</blockquote>\n<p>Each badge shows current status. Click in for detail; vote or comment via Giscus at the bottom.</p>\n<div class=\"grid-4\">\n    <div class=\"stat-card stat-card--approved\">\n      <div class=\"stat-card__num\">1</div>\n      <div class=\"stat-card__label\">Approved</div>\n      <div class=\"stat-card__sub\">this week</div>\n    </div>\n    <div class=\"stat-card stat-card--proposed\">\n      <div class=\"stat-card__num\">0</div>\n      <div class=\"stat-card__label\">Proposed</div>\n      <div class=\"stat-card__sub\">in review</div>\n    </div>\n    <div class=\"stat-card stat-card--muted\">\n      <div class=\"stat-card__num\">60</div>\n      <div class=\"stat-card__label\">Planned</div>\n      <div class=\"stat-card__sub\">roadmap</div>\n    </div>\n    <div class=\"stat-card\">\n      <div class=\"stat-card__num ss=\"dish-card__id\">DISH-AR-ASADO-CHIMICHURRI</span>\n    </div>\n    <h3 class=\"dish-card__title\">Argentinian asado with chimichurri</h3>\n    <p class=\"dish-card__subtitle\">阿根廷烤肉 + 香草酱</p>\n    \n    \n    <div class=\"dish-card__divider\"></div>\n    <div class=\"dish-card__sku\">\n      <span class=\"dish-card__sku-label\">USES</span>\n      <span class=\"dish-card__sku-id\">WET-AR-CHIMICHURRI-v1</span>\n    </div>\n  </a></div>","lang":"en"},"en/board/recent":{"title":"Recently approved","html":"<h1>Recently approved</h1>\n<blockquote>\n<p>Auto-listed dishes promoted to approved in the last 30 days.</p>\n</blockquote>\n<p>Generated by <code>bun run scripts/build-html.ts</code> from git log + dishes.yaml.</p>\n","lang":"en"},"en/buy/buying-guide":{"title":"Buying guide overview","html":"<h1>Buying guide overview</h1>\n<p>Three procurement rhythms:</p>\n<h2>1. Always-stocked (<code>bulk_pantry</code>) — large bottles/bags</h2>\n<p>Examples: salt, light soy, rice, garlic, onion, whole spices.\n~20 core items, long-term stocked.</p>\n<h2>2. Periodic bulk (<code>seasonal_buy</code>) — moderate batches</h2>\n<p>Examples: garam masala, specialty pastes, cassia bark.\nRestock when opening a new cuisine.</p>\n<h2>3. On-demand small (<code>on_demand_online</code>) — order as needed</h2>\n<p>Examples: bottled lime juice, lemongrass, galangal.\nDon&#39;t stockpile; buy what a dish needs.</p>\n<h2>Detailed per-layer</h2>\n<ul>\n<li><a href=\"#/en/buy/ingredients\">Ingredients</a></li>\n<li><a href=\"#/en/buy/fresh-aromatics\">Fresh aromatics</a></li>\n<li><a href=\"#/en/buy/condiments\">Base condiments</a></li>\n<li><a href=\"#/en/buy/dry-pantry\">Dry pantry</a></li>\n<li><a href=\"#/en/buy/hardware-guide\">Hardware guide</a></li>\n<li><a href=\"#/en/buy/consumables-guide\">Consumables</a></li>\n</ul>\n<h2>Why hardware can be minimal</h2>\n<p>Chinese fresh e-commerce sells pre-cut meat, deboned thighs, shredded radish.\nEach ingredient has <code>cn_market_pre_prepped[]</code> listing the common pre-prepped forms.\nBuy these to skip CUT-* SOPs entirely (they&#39;re marked <code>optional_if_pre_prepped: true</code>).</p>\n","lang":"en"},"en/buy/condiments":{"title":"Base condiments","html":"<h1>Base condiments</h1>\n<p>Source of truth: <a href=\"../../../data/condiments.yaml\">data/condiments.yaml</a>.</p>\n<p>Large-bottle stocked, NOT broken into SKUs.</p>\n<h2>Quick survey (~20 items)</h2>\n<ul>\n<li><strong>Salty-umami</strong>: light soy, dark soy, oyster sauce, fish sauce, salt</li>\n<li><strong>Acid</strong>: rice vinegar, black vinegar (Chinkiang), bottled lemon juice</li>\n<li><strong>Sweet</strong>: white sugar, rock sugar, honey</li>\n<li><strong>Oils</strong>: neutral cooking oil, toasted sesame oil, olive oil</li>\n<li><strong>Pastes</strong>: Pixian doubanjiang, miso, gochujang, Thai red/green curry paste</li>\n<li><strong>Canned</strong>: tomatoes, coconut milk</li>\n</ul>\n<p>Full bilingual fields in the yaml; terminology in <a href=\"#/en/glossary\">glossary</a>.</p>\n","lang":"en"},"en/buy/consumables-guide":{"title":"Consumables buying guide","html":"<h1>Consumables buying guide</h1>\n<p>Non-tool consumables LK uses, all with food-safety considerations.</p>\n<h2>HW-VACUUM-BAGS</h2>\n<p>See <a href=\"../../../data/hardware.yaml\">data/hardware.yaml</a> HW-VACUUM-BAGS entry.</p>\n<p><strong>Key</strong>:</p>\n<ul>\n<li>Thickness 90μ minimum (90/100/120 are the common tiers)</li>\n<li>One smooth + one channeled face required for home sealers; pure smooth only for chamber sealers</li>\n<li><strong>Must be BPA-free, food-grade</strong></li>\n<li>Cannot microwave; freeze + boil OK (check rating)</li>\n<li><strong>Used bags cannot be re-sealed</strong> (cross-contamination)</li>\n</ul>\n<p>Price: roll 25×500cm, 30–80 CNY.</p>\n<h2>HW-SPICE-SACHETS</h2>\n<ul>\n<li>Food-grade non-woven (PP / corn fiber), boil-safe</li>\n<li>Drawstring beats sewn closure</li>\n<li>6×8cm + 8×12cm both useful</li>\n<li><strong>PE plastic tea bags leach at high temp → DO NOT USE</strong></li>\n<li>Bag spices into sachets BEFORE vacuum sealing the outer bag (else granules get sucked into the sealer)</li>\n</ul>\n<h2>HW-FREEZER-LABELS</h2>\n<ul>\n<li>Must be waterproof freezer-grade (regular shipping labels peel after a week frozen)</li>\n<li>Pair with permanent marker (zebra mckee / sharpie)</li>\n<li>Double-back labels (peel + stick) easier to apply</li>\n</ul>\n<h2>Recommended label content</h2>\n<pre><code>[SKU id]\n[date made]\n[batch]\n[use-by]\n</code></pre>\n<p>See SOP-LABELING-001 (referenced by add-dish).</p>\n","lang":"en"},"en/buy/dry-pantry":{"title":"Dry pantry","html":"<h1>Dry pantry</h1>\n<p>Source of truth: <a href=\"../../../data/dry-pantry.yaml\">data/dry-pantry.yaml</a>.</p>\n<p>This layer is LK&#39;s strategic core — <strong>bulk-buy dry spices, then portion into SKUs by formula</strong>.</p>\n<h2>Whole spices</h2>\n<p>Star anise, bay leaf, cassia bark, white peppercorn, Sichuan peppercorn, dried tangerine peel, dried chili</p>\n<h2>Ground spices</h2>\n<p>Cumin, paprika, smoked paprika, chili powder, curry powder, turmeric, garlic/onion powder, black/white pepper</p>\n<h2>Dried umami</h2>\n<p>Dashi powder, dried shiitake, wakame, kombu</p>\n<h2>Why bulk</h2>\n<ul>\n<li>Whole spices sealed dark: 1–3 year flavor window</li>\n<li>Ground spices: 6–12 months before fading</li>\n<li>Bulk + reasonable cycle = lower unit cost + better flavor</li>\n</ul>\n","lang":"en"},"en/buy/fresh-aromatics":{"title":"Fresh aromatics","html":"<h1>Fresh aromatics</h1>\n<p>Source of truth: <a href=\"../../../data/fresh-aromatics.yaml\">data/fresh-aromatics.yaml</a>.</p>\n<h2>Three tiers</h2>\n<h3>Always keep</h3>\n<p>Ginger, garlic, scallion (high frequency)</p>\n<h3>Buy when needed</h3>\n<p>Cilantro, lime, mint, basil, Thai basil</p>\n<h3>Skip in MVP (specialty only)</h3>\n<p>Lemongrass, galangal, makrut lime leaves — rare in Chinese kitchens; substitute with commercial Thai curry pastes</p>\n","lang":"en"},"en/buy/hardware-guide":{"title":"Hardware buying guide","html":"<h1>Hardware buying guide</h1>\n<p>Source of truth: <a href=\"../../../data/hardware.yaml\">data/hardware.yaml</a> (full <code>buying_guide</code> field per item).</p>\n<h2>10-piece MVP</h2>\n<table>\n<thead>\n<tr>\n<th>ID</th>\n<th>Item</th>\n<th>Price (CNY)</th>\n<th>Key spec</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>HW-CHEF-KNIFE</td>\n<td>Chef&#39;s knife</td>\n<td>150–800</td>\n<td>20cm forged blade</td>\n</tr>\n<tr>\n<td>HW-CLEAVER</td>\n<td>Chinese cleaver</td>\n<td>100–500</td>\n<td>All-purpose, 400–500g</td>\n</tr>\n<tr>\n<td>HW-WOK-OR-SKILLET</td>\n<td>Wok/skillet</td>\n<td>150–400 (carbon)</td>\n<td>30–34cm diameter</td>\n</tr>\n<tr>\n<td>HW-SOUP-POT</td>\n<td>Soup pot</td>\n<td>200–600 (steel)</td>\n<td>5L+</td>\n</tr>\n<tr>\n<td>HW-MEASURING-SPOONS</td>\n<td>Measuring spoons</td>\n<td>30–80</td>\n<td>Stainless 4–6 piece</td>\n</tr>\n<tr>\n<td>HW-KITCHEN-SCALE</td>\n<td>Kitchen scale</td>\n<td>60–200</td>\n<td>0.1g precision</td>\n</tr>\n<tr>\n<td>HW-VACUUM-SEALER</td>\n<td>Vacuum sealer</td>\n<td>200–600</td>\n<td>Wet-mode required</td>\n</tr>\n<tr>\n<td>HW-VACUUM-BAGS</td>\n<td>Vacuum bags</td>\n<td>roll 30–80</td>\n<td>90+μ BPA-free</td>\n</tr>\n<tr>\n<td>HW-SPICE-SACHETS</td>\n<td>Spice sachets</td>\n<td>100pk 10–25</td>\n<td>Food-grade PP, drawstring</td>\n</tr>\n<tr>\n<td>HW-FREEZER-LABELS</td>\n<td>Freezer labels</td>\n<td>roll 15–30</td>\n<td>Waterproof freezer-grade</td>\n</tr>\n</tbody></table>\n<h2>Detailed fields</h2>\n<p>Each yaml entry includes:</p>\n<ul>\n<li><code>buying_guide.key_considerations</code></li>\n<li><code>buying_guide.spec_hint</code></li>\n<li><code>buying_guide.food_safety</code></li>\n<li><code>buying_guide.common_pitfalls</code></li>\n<li><code>buying_guide.price_band_cny</code></li>\n</ul>\n<p>Reading the yaml directly is more comprehensive than this page.</p>\n<h2>Non-MVP equipment</h2>\n<p>See <a href=\"../../../data/hardware-extensions.yaml\">hardware-extensions.yaml</a>: oven, rice cooker, pressure cooker, steamer, air fryer, immersion blender, instant-read thermometer.</p>\n<p>Each lists <code>why</code> (which dishes need it) + <code>workaround</code> (how to substitute with MVP gear).</p>\n","lang":"en"},"en/buy/ingredients":{"title":"Base ingredients","html":"<h1>Base ingredients</h1>\n<p>Source of truth: <a href=\"../../../data/ingredients.yaml\">data/ingredients.yaml</a>.</p>\n<h2>Key principles</h2>\n<ul>\n<li>Don&#39;t pre-pack proteins or vegetables (preserves the human ritual)</li>\n<li>Use Chinese e-commerce pre-prepped forms via <code>cn_market_pre_prepped[]</code></li>\n<li>Categorize by <code>procurement_mode</code></li>\n</ul>\n<h2>Quick survey</h2>\n<h3>Proteins</h3>\n<p>Eggs, tofu, chicken thigh, pork belly, beef brisket, sliced pork/beef, peeled shrimp, fish fillet</p>\n<h3>Vegetables</h3>\n<p>Onion, daikon, cabbage, leafy greens, mushrooms, carrot, potato, tomato</p>\n<h3>Grains</h3>\n<p>Rice, noodles, rice noodles, udon, pasta</p>\n<p>Full fields (zh+en names, aliases, storage, procurement, pre-prep, buying notes) in the yaml.</p>\n","lang":"en"},"en/compose/canton-clear-beef-noodles":{"title":"Cantonese clear-broth beef brisket rice noodles / 清汤牛腩粉","html":"<h1>Cantonese clear-broth beef brisket rice noodles / 清汤牛腩粉</h1>\n<p><span class=\"status status-approved\">approved</span> <span class=\"cuisine\">Cantonese · CN</span></p>\n<blockquote>\n<p>✦ End-to-end example. Demonstrates the minimal closed loop of &quot;DRY pack + multi-SOP composition.&quot;</p>\n</blockquote>\n<h2>Composition formula</h2>\n<pre><code>Fresh ingredients\n  + DRY-CANTON-CLEAR-BEEF-v1\n  + SOP-BLANCH-MEAT-001\n  + SOP-CANTON-CLEAR-BEEF-001\n  + SOP-SOUP-NOODLE-001\n  = a meal\n</code></pre>\n<h2>Ingredients (3 servings)</h2>\n<table>\n<thead>\n<tr>\n<th>Item</th>\n<th>Amount</th>\n<th>Note</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Beef brisket</td>\n<td>600 g</td>\n<td>Buy pre-cut from CN e-commerce</td>\n</tr>\n<tr>\n<td>Daikon radish</td>\n<td>600 g</td>\n<td>Large cubes</td>\n</tr>\n<tr>\n<td>Rice noodles</td>\n<td>200 g</td>\n<td></td>\n</tr>\n<tr>\n<td>Leafy greens</td>\n<td>100 g</td>\n<td>Blanch only</td>\n</tr>\n<tr>\n<td>Chopped scallion</td>\n<td>1 handful</td>\n<td>At plating</td>\n</tr>\n</tbody></table>\n<h2>Time</h2>\n<table>\n<thead>\n<tr>\n<th>Phase</th>\n<th>Minutes</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Prep</td>\n<td>15</td>\n</tr>\n<tr>\n<td><strong>Hands-on</strong></td>\n<td><strong>25</strong></td>\n</tr>\n<tr>\n<td>Unattended</td>\n<td>120</td>\n</tr>\n<tr>\n<td>Total</td>\n<td>160</td>\n</tr>\n</tbody></table>\n<h2>Flavor structure (Salt Fat Acid Heat)</h2>\n<ul>\n<li><strong>Salt</strong>: fish sauce + light soy (added at end)</li>\n<li><strong>Fat</strong>: from beef brisket (no added oil)</li>\n<li><strong>Acid</strong>: null (clear broth doesn&#39;t take acid)</li>\n<li><strong>Heat</strong>: long simmer (90–150 min on bare simmer)</li>\n</ul>\n<h2>Hardware</h2>\n<p>✅ MVP 10-piece kit sufficient (soup pot + chef knife + spice sachets + vacuum bags)</p>\n<h2>Steps (from SOP-CANTON-CLEAR-BEEF-001)</h2>\n<ol>\n<li>Blanch beef in cold water 3–5 min</li>\n<li>Rinse with warm water, cut into 5cm cubes</li>\n<li>To pot: 1.5–2L water + beef + 3 ginger slices + spice pack</li>\n<li>Boil hard, then bare simmer 90–150 min with lid ajar</li>\n<li>Add daikon for the last 25–40 min</li>\n<li>Season: salt + fish sauce + 5g rock sugar</li>\n<li>Top with scallion; serve over noodles or rice</li>\n</ol>\n<h2>Key tips</h2>\n<ul>\n<li>Cold-water start traps less scum</li>\n<li>Bare simmer = clear broth; rolling boil = cloudy</li>\n<li>Late daikon avoids bitterness</li>\n<li>Fish sauce is umami booster, not flavor imposer</li>\n</ul>\n<h2>Reuse</h2>\n<ul>\n<li>DRY pack: only used here</li>\n<li>SOP-SOUP-NOODLE-001: also used in Japanese ramen, Vietnamese pho, Sichuan beef noodle soup</li>\n<li>SOP-CLEAR-STEW-001: also used in Japanese miso soup, Vietnamese pho broth</li>\n</ul>\n<hr>\n<blockquote>\n<p>★ End-to-end example for the <code>add-dish</code> skill. All fields maintainer-reviewed + cross-CLI audited.\nSee something off? Comment via Giscus below or <a href=\"https://github.com/owner/lazy-kitchen/issues\">open a GitHub Issue</a>.</p>\n</blockquote>\n<div class=\"giscus-wrapper\"><div class=\"empty\">\n      <div class=\"empty__title\">💬 Discussion</div>\n      <div class=\"empty__sub\">Giscus would mount here at term=canton-clear-beef-noodles (set GISCUS_REPO_ID env to enable)</div>\n    </div></div>","lang":"en"},"en/cook/canton-clear-beef":{"title":"SOP-CANTON-CLEAR-BEEF-001 / Cantonese clear-broth beef brisket SOP","html":"<h1>SOP-CANTON-CLEAR-BEEF-001 / Cantonese clear-broth beef brisket SOP</h1>\n<p><span class=\"status status-approved\">approved</span></p>\n<table>\n<thead>\n<tr>\n<th>Field</th>\n<th>Value</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>heat_type</td>\n<td>moist</td>\n</tr>\n<tr>\n<td>cooking_method</td>\n<td>simmer</td>\n</tr>\n<tr>\n<td>station</td>\n<td>saucier</td>\n</tr>\n<tr>\n<td>time_tier</td>\n<td>half-day</td>\n</tr>\n<tr>\n<td>heat_level</td>\n<td>simmer</td>\n</tr>\n<tr>\n<td>equipment</td>\n<td>soup pot + spice sachets</td>\n</tr>\n</tbody></table>\n<h2>Steps</h2>\n<ol>\n<li>Place beef brisket in cold water; bring to boil, blanch 3–5 minutes</li>\n<li>Remove, rinse off scum with warm water, drain, cut into ~5cm cubes</li>\n<li>To soup pot: 1.5–2L water + beef + 3 ginger slices + spice pack</li>\n<li>Bring to a hard boil, then drop to a bare simmer with lid ajar; simmer 90–150 minutes</li>\n<li>Add daikon (large cubes) for the last 25–40 minutes</li>\n<li>Season at end: salt + a touch of fish sauce + ~5g rock sugar; taste</li>\n<li>Top with chopped scallion; serve over rice noodles, flat noodles, or rice</li>\n</ol>\n<h2>Key tips</h2>\n<ul>\n<li>Blanch from cold water; hot start traps scum inside the meat</li>\n<li>Bare simmer with lid ajar keeps broth clear; rolling boil = cloudy broth</li>\n<li>Daikon goes in late or it turns bitter</li>\n<li>Use fish sauce sparingly — it deepens umami without imposing its own flavor</li>\n</ul>\n<h2>Used in</h2>\n<ul>\n<li><a href=\"#/en/compose/canton-clear-beef-noodles\">Cantonese clear-broth beef brisket noodles</a></li>\n</ul>\n<h2>Source of truth</h2>\n<p>See <code>data/sop.yaml</code> entry <code>SOP-CANTON-CLEAR-BEEF-001</code>.</p>\n<div class=\"giscus-wrapper\"><div class=\"empty\">\n      <div class=\"empty__title\">💬 Discussion</div>\n      <div class=\"empty__sub\">Giscus would mount here at term=canton-clear-beef (set GISCUS_REPO_ID env to enable)</div>\n    </div></div>","lang":"en"},"en/cook/doneness":{"title":"Doneness","html":"<h1>Doneness</h1>\n<p>&quot;How do I know it&#39;s cooked?&quot; is genuinely hard tacit knowledge. LK gives a quick reference.</p>\n<h2>Internal temp (most accurate)</h2>\n<p>Requires <a href=\"#/en/buy/hardware-guide\">HW-INSTANT-THERMOMETER</a>.</p>\n<table>\n<thead>\n<tr>\n<th>Item</th>\n<th>Internal °C</th>\n<th>State</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Steak (rare)</td>\n<td>49–54</td>\n<td>Bright red center</td>\n</tr>\n<tr>\n<td>Steak (medium)</td>\n<td>60–63</td>\n<td>Pink center</td>\n</tr>\n<tr>\n<td>Steak (well-done)</td>\n<td>71+</td>\n<td>Fully gray</td>\n</tr>\n<tr>\n<td>Chicken (safety)</td>\n<td>74</td>\n<td>Mandatory minimum</td>\n</tr>\n<tr>\n<td>Pork (safety)</td>\n<td>63 + 3min rest</td>\n<td></td>\n</tr>\n<tr>\n<td>Fish (most)</td>\n<td>52–55</td>\n<td></td>\n</tr>\n<tr>\n<td>Salmon (medium)</td>\n<td>49–52</td>\n<td></td>\n</tr>\n</tbody></table>\n<h2>Visual</h2>\n<ul>\n<li><strong>Chicken</strong>: cut and check juices — clear = done, pink = not done</li>\n<li><strong>Shrimp</strong>: C-shape = done, O-shape = overcooked</li>\n<li><strong>Fish</strong>: poke with chopstick — natural flakes = done</li>\n<li><strong>Pasta</strong>: cross-section — no white center = al dente</li>\n<li><strong>Rice</strong>: pot edge dry + center fluffy = done</li>\n</ul>\n<h2>Time-based (imprecise but workable)</h2>\n<ul>\n<li>Chicken thigh stewed 30+ min = definitely cooked</li>\n<li>Beef brisket 1.5–2.5 hr = tender</li>\n<li>Rice cooker click to keep-warm = done</li>\n</ul>\n<h2>Smell / sound</h2>\n<ul>\n<li>Deep fry: large sizzle → fine sizzle = water steamed out = nearly done</li>\n<li>Roast meat: visible smoke from rendered fat = surface searing well</li>\n</ul>\n<h2>Unreliable methods</h2>\n<ul>\n<li>❌ Fixed minutes by clock — pan temp + meat size both vary</li>\n<li>❌ Color alone — outside vs inside differs</li>\n<li>❌ IR thermometer on meat — measures surface only</li>\n</ul>\n<h2>Safety floor</h2>\n<ul>\n<li>Chicken, whole birds, ground meat, raw fish: when in doubt, cook 1 more minute (better than risk)</li>\n<li>Don&#39;t substitute &quot;I trust my eyes&quot; for an actual thermometer</li>\n</ul>\n","lang":"en"},"en/cook/index":{"title":"Cook — SOPs","html":"<h1>Cook — SOPs</h1>\n<p>See <a href=\"../../../data/sop.yaml\">data/sop.yaml</a> — 22 SOPs, 1 fully filled (Cantonese clear beef).</p>\n<h2>Categorization (CIA cooking-method taxonomy)</h2>\n<h3>Moist heat</h3>\n<p>BLANCH-MEAT, CLEAR-STEW, BRAISE, SOUP-NOODLE, COOKED-BASE</p>\n<h3>Dry heat</h3>\n<p>STIR-FRY, PAN-SEAR</p>\n<h3>Combination</h3>\n<p>BRAISE (incl. hongshao), some stews</p>\n<h3>Prep / package</h3>\n<ul>\n<li>CUT-* (julienne, dice, mince, rollblock)</li>\n<li>MARINATE-* (wet, dry-rub, velvet)</li>\n<li>VACUUM-DRY, VACUUM-LIQUID, REHEAT, LABELING</li>\n<li>CLEAN-WOK-HOT</li>\n<li>OPTIMIZE-* (parallel, overlap, sku-ahead, batch-prep)</li>\n</ul>\n<h2>End-to-end example</h2>\n<p><a href=\"#/en/cook/canton-clear-beef\">SOP-CANTON-CLEAR-BEEF-001</a> — 7 steps + 4 tips, bilingual.</p>\n<h2>Brigade station</h2>\n<p>Each SOP carries a <code>station</code> field (garde-manger / saucier / saute / grill / fry / pastry / none) for parallel cooking planning.</p>\n<h2>Time tier</h2>\n<p>Each SOP carries <code>time_tier</code> (5m / 15m / 30m / 1h / half-day / overnight).</p>\n<h2>Chinese e-commerce shortcut</h2>\n<p>CUT-* SOPs default to <code>optional_if_pre_prepped: true</code> — buying pre-cut meat/veg lets you skip them.</p>\n","lang":"en"},"en/cook/mise-en-place":{"title":"Mise en place","html":"<h1>Mise en place</h1>\n<blockquote>\n<p>Escoffier&#39;s kitchen discipline: <strong>all materials in place before fire on</strong>.</p>\n</blockquote>\n<h2>Why</h2>\n<ul>\n<li>Chinese stir-fry especially: once the pan heats up, mid-cook chopping is too late</li>\n<li>Eliminates &quot;oh wait I forgot...&quot; panic moments</li>\n<li>Lets <code>hands_on_min</code> actually match what the yaml says</li>\n</ul>\n<h2>How</h2>\n<h3>Before lighting fire</h3>\n<ol>\n<li>Read the entire SOP</li>\n<li>List all needed ingredients + condiments + SKU packs</li>\n<li>Cut, measure, plate everything in small bowls</li>\n<li>Prepare the serving vessel (plate or bowl)</li>\n<li>Cloth, trivet, spatula within arm&#39;s reach</li>\n</ol>\n<h3>Plating layout</h3>\n<pre><code>Bowl 1: garlic + ginger + scallion (one-pot pour)\nBowl 2: meat + marinade (separate)\nBowl 3: vegetables (in cooking order)\nBowl 4: seasonings (soy + vinegar + sugar pre-measured)\nBowl 5: finishers (slurry + sesame oil, last second)\n</code></pre>\n<h3>Then light the fire</h3>\n<p>Follow SOP. No WeChat, no phone calls.</p>\n<h2>SKU benefit</h2>\n<p>If you&#39;re using LK&#39;s DRY/WET packs:</p>\n<ul>\n<li>DRY pack = your &quot;spice bowl&quot; condensed</li>\n<li>WET pack = your &quot;marinade bowl&quot; condensed</li>\n<li>Cutting (CUT-*) mostly delegated to e-commerce pre-prep</li>\n</ul>\n<p>→ Mise en place compresses to 5 minutes.</p>\n","lang":"en"},"en/glossary":{"title":"Bilingual glossary","html":"<h1>Bilingual glossary</h1>\n<blockquote>\n<p>Source of truth: <a href=\"../../../data/glossary.yaml\">data/glossary.yaml</a>.\nAI translation guardrail: any spice / ingredient / technique must resolve here BEFORE appearing in yaml.</p>\n</blockquote>\n<h2>Why this page exists</h2>\n<p>Chinese-English translation has many traps:</p>\n<ul>\n<li><strong>大料</strong> ≠ &quot;big spice&quot; → <strong>Star anise</strong></li>\n<li><strong>花椒</strong> ≠ &quot;black pepper&quot; → <strong>Sichuan peppercorn</strong></li>\n<li><strong>生抽</strong> ≠ generic &quot;soy sauce&quot; → <strong>Light soy sauce</strong> (distinct from dark)</li>\n<li><strong>南姜</strong> ≠ &quot;ginger&quot; → <strong>Galangal</strong></li>\n</ul>\n<p>LK fixes each correspondence; AI must look up glossary before translating, never improvise.</p>\n<h2>Selected categories</h2>\n<h3>Soy sauces</h3>\n<ul>\n<li>生抽 → Light soy sauce</li>\n<li>老抽 → Dark soy sauce</li>\n<li>蚝油 → Oyster sauce</li>\n<li>鱼露 → Fish sauce</li>\n</ul>\n<h3>Vinegars</h3>\n<ul>\n<li>米醋 → Rice vinegar (≠ white vinegar)</li>\n<li>黑醋 → Chinese black vinegar / Chinkiang vinegar</li>\n</ul>\n<h3>Whole spices</h3>\n<ul>\n<li>八角 / 大料 → Star anise (≠ big spice)</li>\n<li>花椒 → Sichuan peppercorn (≠ black pepper)</li>\n<li>桂皮 → Cassia bark (≠ true cinnamon)</li>\n<li>陈皮 → Dried tangerine peel</li>\n</ul>\n<h3>Fresh aromatics</h3>\n<ul>\n<li>香茅 → Lemongrass</li>\n<li>南姜 → Galangal (≠ ginger)</li>\n<li>柠檬叶 → Makrut lime leaves (avoid &quot;kaffir&quot;)</li>\n</ul>\n<h3>Proteins / vegetables</h3>\n<ul>\n<li>牛腩 → Beef brisket / beef flank</li>\n<li>白萝卜 → Daikon radish</li>\n<li>五花肉 → Pork belly</li>\n</ul>\n<h3>Techniques</h3>\n<ul>\n<li>焯水 → Blanch</li>\n<li>红烧 → Hongshao braise / red-braise</li>\n<li>上浆 → Velveting</li>\n</ul>\n<h2>Contributing terms</h2>\n<p>When add-dish encounters a missing term, Step 4 sub-flow asks you to confirm zh/en/alias/category before appending.\nYou can also PR <code>data/glossary.yaml</code> directly.</p>\n<div class=\"search\">\n      <span class=\"muted\">⌕</span>\n      <input type=\"search\" placeholder=\"Search terms… (zh or en)\" />\n    </div>\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin:16px 0\"><a class=\"filter-pill active\" href=\"#\" data-cat=\"all\">all</a> <a class
