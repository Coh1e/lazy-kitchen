s=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">vegetable</span>\n      \n    </div>\n    <div class=\"term-card__zh\">白萝卜</div>\n    <div class=\"term-card__en\">Daikon radish</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">vegetable</span>\n      \n    </div>\n    <div class=\"term-card__zh\">卷心菜</div>\n    <div class=\"term-card__en\">Cabbage</div>\n    <div class=\"term-card__alias\">alias · zh: 圆白菜, 包菜</div>\n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">vegetable</span>\n      \n    </div>\n    <div class=\"term-card__zh\">青菜</div>\n    <div class=\"term-card__en\">Leafy greens</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">grain</span>\n      \n    </div>\n    <div class=\"term-card__zh\">河粉</div>\n    <div class=\"term-card__en\">Rice noodles</div>\n    <div class=\"term-card__alias\">alias · en: flat rice noodles</div>\n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">grain</span>\n      \n    </div>\n    <div class=\"term-card__zh\">乌冬</div>\n    <div class=\"term-card__en\">Udon</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">grain</span>\n      \n    </div>\n    <div class=\"term-card__zh\">米</div>\n    <div class=\"term-card__en\">Rice</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">grain</span>\n      \n    </div>\n    <div class=\"term-card__zh\">面条</div>\n    <div class=\"term-card__en\">Noodles</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">technique</span>\n      \n    </div>\n    <div class=\"term-card__zh\">焯水</div>\n    <div class=\"term-card__en\">Blanch</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">technique</span>\n      \n    </div>\n    <div class=\"term-card__zh\">红烧</div>\n    <div class=\"term-card__en\">Hongshao braise</div>\n    <div class=\"term-card__alias\">alias · en: red-braise</div>\n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">technique</span>\n      \n    </div>\n    <div class=\"term-card__zh\">上浆</div>\n    <div class=\"term-card__en\">Velveting</div>\n    \n    \n  </div></div>","lang":"en"},"en/pack/dry/canton-clear-beef":{"title":"DRY-CANTON-CLEAR-BEEF-v1 / Cantonese clear-broth beef brisket spice pack","html":"<h1>DRY-CANTON-CLEAR-BEEF-v1 / Cantonese clear-broth beef brisket spice pack</h1>\n<p><span class=\"status status-approved\">approved</span> <span class=\"cuisine\">Cantonese · CN</span></p>\n<blockquote>\n<p>End-to-end example SKU. Maintainer-reviewed + cross-CLI-audited.</p>\n</blockquote>\n<h2>Flavor profile</h2>\n<table>\n<thead>\n<tr>\n<th>Dimension</th>\n<th>Description</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Profile</td>\n<td>Clear broth, white pepper aroma, daikon sweetness, beef-forward</td>\n</tr>\n<tr>\n<td>flavor_tags</td>\n<td>clear, umami, light</td>\n</tr>\n<tr>\n<td>Spicy</td>\n<td>0</td>\n</tr>\n<tr>\n<td>Heat</td>\n<td>simmer</td>\n</tr>\n<tr>\n<td>Diet</td>\n<td>no-pork, gluten-free, nut-free, dairy-free</td>\n</tr>\n</tbody></table>\n<h2>Contents</h2>\n<table>\n<thead>\n<tr>\n<th>Item</th>\n<th>Amount</th>\n<th>Note</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Star anise</td>\n<td>1 piece</td>\n<td></td>\n</tr>\n<tr>\n<td>Bay leaf</td>\n<td>1 leaf</td>\n<td></td>\n</tr>\n<tr>\n<td>White peppercorn</td>\n<td>1 tsp</td>\n<td></td>\n</tr>\n<tr>\n<td>Dried tangerine peel</td>\n<td>1 small piece</td>\n<td>Optional; adds aromatic layer</td>\n</tr>\n</tbody></table>\n<h2>Yield</h2>\n<p>1 pack pairs with 600–800g beef brisket + 500–800g daikon + 1.5–2L water.</p>\n<h2>Packaging</h2>\n<ol>\n<li>Whole spices into spice sachet bag</li>\n<li>Vacuum-seal outer bag</li>\n<li>Store cool, dark, dry</li>\n</ol>\n<p>Reference SOP: SOP-VACUUM-DRY-001</p>\n<h2>Pairing usage</h2>\n<ul>\n<li>Ingredients: beef brisket, daikon, ginger</li>\n<li>SOPs: SOP-BLANCH-MEAT-001 → SOP-CANTON-CLEAR-BEEF-001</li>\n</ul>\n<h2>Used in</h2>\n<ul>\n<li><a href=\"#/en/compose/canton-clear-beef-noodles\">DISH-CN-CANTON-CLEAR-BEEF-NOODLES</a> — Cantonese clear-broth beef brisket noodles</li>\n</ul>\n<h2>Storage</h2>\n<p><code>pantry-dry-dark</code>: cool, dark, dry, 6–24 months (see storage-profiles.yaml).</p>\n<h2>Source of truth</h2>\n<p>See <code>data/sku/dry.yaml</code> entry <code>DRY-CANTON-CLEAR-BEEF-v1</code>.</p>\n<div class=\"giscus-wrapper\"><div class=\"empty\">\n      <div class=\"empty__title\">💬 Discussion</div>\n      <div class=\"empty__sub\">Giscus would mount here at term=canton-clear-beef (set GISCUS_REPO_ID env to enable)</div>\n    </div></div>","lang":"en"},"en/pack/index":{"title":"Pack — SKU shelf","html":"<h1>Pack — SKU shelf</h1>\n<p>Five SKU types:</p>\n<table>\n<thead>\n<tr>\n<th>Type</th>\n<th>Meaning</th>\n<th>Storage</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>DRY</strong></td>\n<td>Dry spice pack (sachet + vacuum)</td>\n<td>Pantry dry dark, 1–3 years</td>\n</tr>\n<tr>\n<td><strong>WET</strong></td>\n<td>Wet sauce/marinade pack (vacuum-frozen)</td>\n<td>-18°C, 6–12 months</td>\n</tr>\n<tr>\n<td><strong>COOKED</strong></td>\n<td>Cooked base (frozen blocks)</td>\n<td>-18°C, 3–6 months</td>\n</tr>\n<tr>\n<td><strong>SOUP</strong></td>\n<td>Concentrated soup base</td>\n<td>-18°C, 6–12 months</td>\n</tr>\n<tr>\n<td><strong>READY</strong></td>\n<td>Ready-to-heat (meal prep)</td>\n<td>-18°C, 1–2 months</td>\n</tr>\n</tbody></table>\n<h2>v1 data</h2>\n<ul>\n<li><a href=\"../../../data/sku/dry.yaml\">data/sku/dry.yaml</a> — 6 entries (1 fully filled: Cantonese clear beef)</li>\n<li><a href=\"../../../data/sku/wet.yaml\">data/sku/wet.yaml</a> — 2 placeholders</li>\n<li><a href=\"../../../data/sku/cooked.yaml\">data/sku/cooked.yaml</a> — 1 placeholder</li>\n<li><a href=\"../../../data/sku/soup.yaml\">data/sku/soup.yaml</a> — empty (first will arrive via shoyu ramen, pho)</li>\n<li><a href=\"../../../data/sku/ready.yaml\">data/sku/ready.yaml</a> — empty (v2 meal-prep subset)</li>\n</ul>\n<h2>End-to-end example</h2>\n<p><a href=\"#/en/pack/dry/canton-clear-beef\">DRY-CANTON-CLEAR-BEEF-v1 detail</a> — full fields, template for new SKUs.</p>\n<h2>Growth</h2>\n<p>New SKUs are NOT pre-created in v1. Maintainer triggers them via <code>add-dish</code> skill&#39;s propose_new path. Predicted ~44 SKUs once the full menu is mature.</p>\n","lang":"en"},"en/pack/packaging-guide":{"title":"Packaging guide","html":"<h1>Packaging guide</h1>\n<h2>What MUST be portioned</h2>\n<ul>\n<li>Whole spice combinations (DRY pack) → spice sachet + vacuum</li>\n<li>Ground spice combinations → small zip bag inside vacuum</li>\n<li>Wet sauces → vacuum bag (liquid mode) + freeze</li>\n<li>Cooked bases → cool, vacuum, freeze</li>\n<li>Marinated meat → meat + marinade in vacuum + freeze</li>\n</ul>\n<h2>What NOT to portion</h2>\n<table>\n<thead>\n<tr>\n<th>Type</th>\n<th>Reason</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>High-frequency liquid condiments (light soy, fish sauce, rice vinegar)</td>\n<td>Used quickly, bottle works</td>\n</tr>\n<tr>\n<td>High-frequency pastes (miso, doubanjiang)</td>\n<td>Variable amounts</td>\n</tr>\n<tr>\n<td>Base ingredients (egg, tofu, onion)</td>\n<td>Preserve the human ritual</td>\n</tr>\n<tr>\n<td>Fresh herbs (cilantro, mint, lime)</td>\n<td>Spoils fast, buy fresh</td>\n</tr>\n</tbody></table>\n<h2>Portion with caution</h2>\n<table>\n<thead>\n<tr>\n<th>Type</th>\n<th>Reason</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Sauces with fresh garlic</td>\n<td>Fridge unsafe long-term, must freeze</td>\n</tr>\n<tr>\n<td>Scallion oil / garlic oil</td>\n<td>Don&#39;t keep at room temp</td>\n</tr>\n<tr>\n<td>Liquid soup packs</td>\n<td>Pre-freeze, then vacuum (else sucked into sealer)</td>\n</tr>\n<tr>\n<td>Loose powder direct vacuum</td>\n<td>Powder gets sucked in; bag in sachet first</td>\n</tr>\n</tbody></table>\n<h2>Referenced SOPs</h2>\n<ul>\n<li>SOP-VACUUM-DRY-001 — dry vacuum</li>\n<li>SOP-VACUUM-LIQUID-001 — liquid vacuum</li>\n<li>SOP-LABELING-001 — labeling</li>\n</ul>\n","lang":"en"},"en/ratios/index":{"title":"Ratios","html":"<h1>Ratios</h1>\n<p>See <a href=\"../../../data/ratios.yaml\">data/ratios.yaml</a>.</p>\n<h2>5 classical mother sauces + Chinese extension</h2>\n<p>LK treats Escoffier&#39;s 5 mother sauces + Chinese hongshao base as RATIO first-class entities, building an <strong>inheritable flavor family tree</strong>:</p>\n<pre><code class=\"language-text\">RATIO-MOTHER-BECHAMEL-v1     (milk + roux)\nRATIO-MOTHER-VELOUTE-v1      (white stock + roux)\nRATIO-MOTHER-ESPAGNOLE-v1    (brown stock + browned roux)\nRATIO-MOTHER-HOLLANDAISE-v1  (egg yolk + butter + lemon)\nRATIO-MOTHER-TOMATO-v1       (tomato base)\nRATIO-MOTHER-CN-BRAISE-v1    ★ Chinese hongshao\n</code></pre>\n<p>Each mother lists <code>daughters[]</code>: béchamel + cheese → mornay; CN-BRAISE + 4 more → yuxiang, etc.</p>\n<h2>v1 derivatives</h2>\n<ul>\n<li>RATIO-CN-FISHSCENT-v1 (Yuxiang 1:1:1:1) — derived from CN-BRAISE</li>\n<li>RATIO-PH-ADOBO-v1 (Filipino adobo 1:1:1)</li>\n<li>RATIO-WEST-VINAIGRETTE-v1 (oil:vinegar 3:1)</li>\n</ul>\n<h2>Growth</h2>\n<p>New RATIOs grow via add-dish skill&#39;s propose_new path. Predicted ~13 formulas at full menu.</p>\n","lang":"en"},"en/start/hardware":{"title":"Minimal hardware","html":"<h1>Minimal hardware</h1>\n<p>LK locks the <strong>10-piece MVP</strong>:</p>\n<pre><code class=\"language-text\">Knives:       Chef&#39;s knife · Chinese cleaver\nCookware:     Wok · Soup pot\nMeasurement:  Measuring spoons · Kitchen scale\nConsumables:  Vacuum sealer · Vacuum bags · Spice sachets · Freezer labels\n</code></pre>\n<p><strong>That&#39;s all.</strong></p>\n<p>Dishes needing oven / rice cooker / air fryer / blender must declare <code>hardware_extension</code> and have a workaround in <a href=\"../../../data/hardware-extensions.yaml\">hardware-extensions.yaml</a>.</p>\n<p>Per-item buying guide (key considerations / spec / food safety / pitfalls / price band) → <a href=\"#/en/buy/hardware-guide\">hardware-guide</a>.</p>\n","lang":"en"},"en/start/heat-and-oil":{"title":"Heat & oil temperature","html":"<h1>Heat &amp; oil temperature</h1>\n<p>Two independent dimensions used by every SOP.</p>\n<h2>Heat tiers</h2>\n<p>See <a href=\"../../../data/heat-tiers.yaml\">data/heat-tiers.yaml</a>.</p>\n<table>\n<thead>\n<tr>\n<th>ID</th>\n<th>Name</th>\n<th>Visual</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>high</td>\n<td>High</td>\n<td>Pan smokes, oil sizzles</td>\n</tr>\n<tr>\n<td>medium-high</td>\n<td>Medium-high</td>\n<td>Oil ripples, meat sizzles loudly</td>\n</tr>\n<tr>\n<td>medium</td>\n<td>Medium</td>\n<td>Oil still and warm</td>\n</tr>\n<tr>\n<td>medium-low</td>\n<td>Medium-low</td>\n<td>Almost no heat radiating</td>\n</tr>\n<tr>\n<td>low</td>\n<td>Low</td>\n<td>Tiny bubbles in broth</td>\n</tr>\n<tr>\n<td>simmer</td>\n<td>Bare simmer</td>\n<td>Surface nearly still</td>\n</tr>\n</tbody></table>\n<h2>Oil temperature tiers (Chinese &quot;cheng&quot; scale)</h2>\n<p>See <a href=\"../../../data/oil-temp-tiers.yaml\">data/oil-temp-tiers.yaml</a>.</p>\n<table>\n<thead>\n<tr>\n<th>Tier</th>\n<th>°C</th>\n<th>Visual</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>1–2 cheng</td>\n<td>30–60</td>\n<td>Still, no bubbles</td>\n</tr>\n<tr>\n<td>3–4 cheng</td>\n<td>90–120</td>\n<td>Small bubbles around chopstick</td>\n</tr>\n<tr>\n<td>5–6 cheng</td>\n<td>150–180</td>\n<td>Dense bubbles, faint smoke</td>\n</tr>\n<tr>\n<td>7–8 cheng</td>\n<td>200–220</td>\n<td>Surface waves, distinct smoke</td>\n</tr>\n<tr>\n<td>9 cheng</td>\n<td>230+</td>\n<td>Heavy smoke (use only for seconds)</td>\n</tr>\n</tbody></table>\n<p>Each SOP references heat tiers via <code>heat_level_used</code> to avoid the ambiguity of &quot;medium heat.&quot;</p>\n","lang":"en"},"en/start/pantry-layers":{"title":"Pantry layers (L0–L4)","html":"<h1>Pantry layers (L0–L4)</h1>\n<pre><code class=\"language-text\">L0  Hardware              data/hardware.yaml + hardware-extensions.yaml\nL1  Base ingredients      data/ingredients.yaml          (high-frequency)\nL2  Fresh aromatics       data/fresh-aromatics.yaml      (buy as needed)\nL3  Base condiments       data/condiments.yaml           (large bottles)\nL4  Dry pantry            data/dry-pantry.yaml           (whole + ground spices + dried umami)\n─────────────────────────────────────────\nL5  Pre-packed SKUs       data/sku/{dry,wet,cooked,soup,ready}.yaml\nL6  SOPs                  data/sop.yaml\nL7  Dishes (composition)  data/dishes.yaml\n</code></pre>\n<p>L0–L4: <strong>buy these</strong>. L5–L7: <strong>construct these via add-dish skill over time</strong>.</p>\n<p>Each L1–L4 item carries <code>procurement_mode</code> (<code>bulk_pantry</code> / <code>seasonal_buy</code> / <code>on_demand_online</code>).\nMany L1 items also carry <code>cn_market_pre_prepped[]</code> listing pre-cut forms commonly available on Chinese fresh e-commerce.</p>\n","lang":"en"},"en/start/philosophy":{"title":"Philosophy","html":"<h1>Philosophy</h1>\n<blockquote>\n<p>Make Kitchen Great Again!</p>\n</blockquote>\n<p>Lazy Kitchen is not a recipe website. It is a <strong>structured, AI-curated, minimal-hardware, time-optimal</strong> kitchen operating system.</p>\n<h2>Five core beliefs</h2>\n<h3>1. Content is the product; the website is just a viewer</h3>\n<p>All real knowledge lives in <code>data/*.yaml</code>. The HTML is just a renderer.\nClone the repo → double-click <code>lazy-kitchen.html</code> → view the full manual offline, zero deps.</p>\n<h3>2. AI does NOT run inside the repo</h3>\n<p>No LLM clients, no API keys, no server code in this repo.\nAI runs in YOUR local CLI agent (Claude Code / Cline + DeepSeek / Codex / Gemini / Aider).\nThe repo only stores <strong>instructions</strong> (<code>skills/add-dish/workflow.md</code>) and <strong>contracts</strong> (<code>schemas/*.json</code>).</p>\n<h3>3. Hardware is locked at 10 pieces</h3>\n<p>Chef&#39;s knife + Chinese cleaver + wok + soup pot + measuring spoons + kitchen scale + vacuum sealer + bags + spice sachets + freezer labels.\n<strong>That&#39;s it.</strong>\nAny dish needing oven / rice cooker / air fryer / blender must declare it in <code>hardware_extension</code>.\nThis works because Chinese fresh-food e-commerce sells pre-cut meat and deboned chicken thighs.</p>\n<h3>4. Time double-track: hands-on vs unattended</h3>\n<p>Every dish carries <code>hands_on_min</code> + <code>unattended_min</code>.\n<strong>The lazy core isn&#39;t short total time — it&#39;s short hands-on time.</strong>\nA 4h beef stew (15min hands-on) is &quot;lazier&quot; than a 30min stir-fry that needs full attention.</p>\n<h3>5. Humans lead taste; AI is the labor</h3>\n<p>Maintainer drafts via add-dish skill → cross-family AI second-opinion → push to bulletin board → community votes/comments → consensus → publish.\nDon&#39;t let AI decide taste, but use AI to accelerate execution.</p>\n<h2>What we don&#39;t do</h2>\n<ul>\n<li>No accounts (GitHub identity)</li>\n<li>No comment DB (GitHub Discussions / Giscus)</li>\n<li>No backend (CF Pages static)</li>\n<li>No &quot;influencer marketing&quot; (let food speak)</li>\n<li>No baking (separate v2 project)</li>\n<li>No &quot;low-carb / low-fat&quot; labels (no diet bias)</li>\n</ul>\n<h2>What we don&#39;t pre-pack</h2>\n<ul>\n<li>Base ingredients (eggs, tofu, onion) — preserve human ritual</li>\n<li>Fresh aromatics (cilantro, mint, lime) — best when fresh</li>\n<li>Cutting itself (delegate to e-commerce)</li>\n</ul>\n<h2>What we DO pre-pack</h2>\n<ul>\n<li>Dry spice combos (DRY pack, pantry-stable for months)</li>\n<li>Wet sauces / marinades (WET pack, vacuum-frozen for months)</li>\n<li>Cooked bases (COOKED block, frozen weeks)</li>\n<li>Soup bases (SOUP concentrate, frozen months)</li>\n<li>Ready meals (READY, meal-prep scenarios)</li>\n</ul>\n<h2>One sentence</h2>\n<p><strong>Ingredient + Flavor SKU + SOP = Meal.</strong></p>\n<p>Reduce a week of cooking from &quot;30 decisions × 7 days&quot; to &quot;3 big decisions + 5 minutes of grab-and-assemble per meal.&quot;</p>\n","lang":"en"},"en/start/safety":{"title":"Food safety","html":"<h1>Food safety</h1>\n<p>LK&#39;s stance: <strong>state risks clearly, don&#39;t pretend to be a sterile lab</strong>.</p>\n<h2>Key risk points</h2>\n<h3>Vacuum bags &amp; sealers</h3>\n<ul>\n<li>Must be <strong>BPA-free, food-grade</strong></li>\n<li>Used packaging <strong>cannot be re-sealed</strong> (cross-contamination)</li>\n<li>Cannot microwave (high-temp leaching)</li>\n<li>Can freeze + boil (check temp rating)</li>\n</ul>\n<h3>Vacuum-frozen meat</h3>\n<ul>\n<li>Recommend -18°C or below</li>\n<li>Flavor window: 6–12 months; safety window: 24+ months</li>\n<li>Thaw in fridge overnight &gt; running water &gt; microwave (in order)</li>\n<li><strong>Do not refreeze after thawing</strong></li>\n</ul>\n<h3>WET SKUs</h3>\n<ul>\n<li>Sauces with fresh garlic / scallion: <strong>must freeze</strong>, fridge ≤ 3 days</li>\n<li>High-acid sauces (vinaigrette / nuoc cham): fridge 2 weeks</li>\n<li>Anhydrous oil-based (chimichurri): fridge 2 weeks</li>\n</ul>\n<h3>COOKED SKUs</h3>\n<ul>\n<li>Cool completely (≤ 2 hr to room temp) → vacuum → freeze</li>\n<li>Don&#39;t bag while hot (condensation accelerates spoilage)</li>\n<li>Thaw only what you&#39;ll use within a week</li>\n</ul>\n<h3>Kitchen environment</h3>\n<ul>\n<li>Cutting boards: separate raw / cooked (recommend 2 colored boards)</li>\n<li>Wash knife immediately after raw meat</li>\n<li>Replace dishcloth daily (mold breeding ground)</li>\n</ul>\n<h3>Spices</h3>\n<ul>\n<li>Whole spices: 3-year flavor window if sealed dark</li>\n<li>Ground spices: 6–12 months before going off</li>\n<li>Caked from moisture → discard (mold risk)</li>\n</ul>\n<h2>Labeling</h2>\n<p>Frozen packs must show:</p>\n<pre><code>[name]  [date]  [batch]  [use-by]\n</code></pre>\n<p>See SOP-LABELING-001 (referenced when add-dish runs).</p>\n<h2>When in doubt</h2>\n<ul>\n<li>Bloated vacuum pack → discard immediately (anaerobic bacteria)</li>\n<li>Off smell / discoloration → discard</li>\n<li>Uncertain → discard is cheaper than testing yourself</li>\n</ul>\n<p>LK does not assume food safety responsibility for you.</p>\n","lang":"en"},"en/start/workflow":{"title":"Workflow","html":"<h1>Workflow</h1>\n<p>The soul of LK is not &quot;follow recipes&quot; but this <strong>4-phase loop</strong>.</p>\n<h2>Phase diagram</h2>\n<pre><code class=\"language-text\">┌────────────────────────────────────────────────────┐\n│                  Cycle starts                       │\n├────────────────────────────────────────────────────┤\n│  ① Plan (10 min)                                    │\n│     Browse dish library; pick by hands_on_min asc.  │\n│     Output: this week&#39;s menu                        │\n├────────────────────────────────────────────────────┤\n│  ② Buy (one-time, 1–2 hr)                           │\n│     a) Hardware/consumables per buying_guide        │\n│     b) Bulk-buy seasonal condiments per SKU recipes │\n│     c) On-demand small batches via fresh e-commerce │\n├────────────────────────────────────────────────────┤\n│  ③ Pack (one-time, half-day)                        │\n│     Mix DRY combos → spice sachets → vacuum bags    │\n│     Make WET sauces → vacuum → freeze               │\n│     Cook COOKED bases → freeze in blocks → vacuum   │\n├────────────────────────────────────────────────────┤\n│                  Daily loop                         │\n├────────────────────────────────────────────────────┤\n│  ④ Execute (15–30 min hands_on per meal)            │\n│     Order pre-cut meat/veg from e-commerce          │\n│     Grab a SKU pack + matching SOP                  │\n│     Follow SOP → plate → eat                        │\n└────────────────────────────────────────────────────┘\n</code></pre>\n<h2>Three procurement rhythms</h2>\n<table>\n<thead>\n<tr>\n<th>Rhythm</th>\n<th>Examples</th>\n<th>Tag</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Always-stocked</td>\n<td>Salt, soy sauce, rice, garlic, scallion</td>\n<td><code>bulk_pantry</code></td>\n</tr>\n<tr>\n<td>Periodic bulk</td>\n<td>masala, specialty pastes, whole spices</td>\n<td><code>seasonal_buy</code></td>\n</tr>\n<tr>\n<td>On-demand small</td>\n<td>Lime juice, lemongrass, galangal</td>\n<td><code>on_demand_online</code></td>\n</tr>\n</tbody></table>\n<h2>Why this works</h2>\n<ul>\n<li>②③ are low-frequency, high-investment</li>\n<li>④ is high-frequency, low-investment because ②③ already done</li>\n<li>The &quot;lazy&quot; payoff is in ④</li>\n</ul>\n","lang":"en"},"zh/ai/choose-your-ai":{"title":"选你的 AI / Choose your AI","html":"<h1>选你的 AI / Choose your AI</h1>\n<p>LK 的 <code>add-dish</code> skill 是 <strong>模型中立</strong>的 —— 任何能读文件、跟你对话的 agentic CLI 都能跑。但不同 CLI / 模型组合在不同场景下体验差很多。</p>\n<h2>CLI × 模型对照</h2>\n<table>\n<thead>\n<tr>\n<th>CLI 工具</th>\n<th>默认模型</th>\n<th>接 DeepSeek 难度</th>\n<th>中文质量</th>\n<th>场景适配</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Claude Code</td>\n<td>Claude (Anthropic)</td>\n<td>❌ 暂不支持自定义端点</td>\n<td>好</td>\n<td>综合任务、Anthropic 用户</td>\n</tr>\n<tr>\n<td>Codex CLI</td>\n<td>GPT-4 / o1</td>\n<td>❌</td>\n<td>好</td>\n<td>OpenAI 用户、强结构化输出</td>\n</tr>\n<tr>\n<td>Gemini CLI</td>\n<td>Gemini</td>\n<td>❌</td>\n<td>中</td>\n<td>Google 生态</td>\n</tr>\n<tr>\n<td><strong>Cline (VS Code)</strong></td>\n<td>任意</td>\n<td>✅ 原生</td>\n<td>DeepSeek 顶</td>\n<td><strong>中文菜系细节首选</strong></td>\n</tr>\n<tr>\n<td><strong>Aider</strong></td>\n<td>任意</td>\n<td>✅ <code>--model deepseek/deepseek-chat</code></td>\n<td>DeepSeek 顶</td>\n<td>喜欢 CLI + git workflow</td>\n</tr>\n<tr>\n<td><strong>Continue.dev</strong></td>\n<td>任意</td>\n<td>✅</td>\n<td>DeepSeek 顶</td>\n<td>VS Code / JetBrains 用户</td>\n</tr>\n<tr>\n<td>Cursor</td>\n<td>自家 + GPT/Claude</td>\n<td>✅ 设置里换</td>\n<td>好</td>\n<td>重度 IDE 用户</td>\n</tr>\n</tbody></table>\n<h2>推荐组合</h2>\n<h3>中文 maintainer</h3>\n<p><strong>写新菜（add-dish 主流程）</strong>:</p>\n<ul>\n<li>首选：<strong>Cline + DeepSeek</strong>（中文菜系细节最准）</li>\n<li>备选：Aider + DeepSeek</li>\n</ul>\n<p><strong>Step 6 跨 CLI 二审</strong>:</p>\n<ul>\n<li>首选：Codex + GPT-4o（结构化 JSON 输出最稳）</li>\n<li>备选：Gemini CLI（独立模型家族）</li>\n</ul>\n<p>→ &quot;DeepSeek 写稿，Codex/Gemini 审稿&quot; 是最稳的工作流。</p>\n<h3>国际 maintainer / 不在意中文细节</h3>\n<p><strong>写</strong>: Claude Code 或 Codex CLI\n<strong>审</strong>: 另一个（不同模型家族）</p>\n<h3>实在没钱 / 极简党</h3>\n<p>只用一个 CLI（Claude Code 或 Codex CLI）。\nStep 6 自动降级到 Tier 3（跳过审稿），条目 status 仍为 proposed 但 <code>cross_reviewed: false</code>，等你日后补审才能升级 approved。</p>\n<h2>安装速查</h2>\n<table>\n<thead>\n<tr>\n<th>工具</th>\n<th>安装</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Claude Code</td>\n<td><a href=\"https://claude.com/claude-code\">https://claude.com/claude-code</a></td>\n</tr>\n<tr>\n<td>Codex CLI</td>\n<td>npm 安装 (按官方文档)</td>\n</tr>\n<tr>\n<td>Gemini CLI</td>\n<td><a href=\"https://ai.google.dev\">https://ai.google.dev</a> (CLI section)</td>\n</tr>\n<tr>\n<td>Cline</td>\n<td>VS Code marketplace 搜 &quot;Cline&quot;</td>\n</tr>\n<tr>\n<td>Aider</td>\n<td><code>pip install aider-chat</code></td>\n</tr>\n<tr>\n<td>Continue.dev</td>\n<td>VS Code marketplace 搜 &quot;Continue&quot;</td>\n</tr>\n<tr>\n<td>Cursor</td>\n<td><a href=\"https://cursor.com\">https://cursor.com</a></td>\n</tr>\n</tbody></table>\n<h2>配 DeepSeek 速查 (以 Aider 为例)</h2>\n<pre><code class=\"language-bash\">export DEEPSEEK_API_KEY=sk-xxx\naider --model deepseek/deepseek-chat\n</code></pre>\n<p>Cline / Continue 在 settings UI 里加 DeepSeek provider 即可。</p>\n<h2>我们不强求</h2>\n<p>LK 的所有 skill 都是 markdown 指令，不依赖任何特定 CLI 的 API。\n你换 CLI 不会影响项目，最多影响个人体验。</p>\n<p>试试不同组合，挑最顺手的。</p>\n","lang":"zh"},"zh/ai/how-it-works":{"title":"AI 工作流 / How it works","html":"<h1>AI 工作流 / How it works</h1>\n<p>LK 的 AI 智能完全在 <strong>maintainer 本机的 CLI agent</strong> 里跑，仓库不存 API key、不调外部服务。</p>\n<h2>一图看懂</h2>\n<pre><code class=\"language-text\">仓库 (lazy-kitchen)              maintainer 本机 CLI agent\n─────────────────                ─────────────────────────\ndata/*.yaml          ◄────read───  Cline + DeepSeek\nschemas/*.json                       │\nskills/add-dish/                     ▼\n  workflow.md        ◄──instruct──  跑 add-dish skill 的 5 + 1 步\n  examples/*.md                      │\n                                     ▼\ndocs/*.md            ◄──write────  把草稿写回 data/ + docs/\n                                     │\n                                     ▼\n                                   git push (maintainer 手动)\n                                     │\n                                     ▼\n                                   CF Pages 自动部署\n                                     │\n                                     ▼\n                                   站点告示栏自动出现 status: proposed\n</code></pre>\n<h2>5 + 1 步流程概览</h2>\n<p>详见 <code>skills/add-dish/workflow.md</code>，以下是简版:</p>\n<table>\n<thead>\n<tr>\n<th>Step</th>\n<th>做什么</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>1. Analyze</td>\n<td>解析菜名 → 菜系、味型、主食材、工艺</td>\n</tr>\n<tr>\n<td>2. Match</td>\n<td>扫现有 SKU/SOP/Ratio → 给信心评级</td>\n</tr>\n<tr>\n<td>3a. use_existing</td>\n<td>直接组装 dish (现有零件够)</td>\n</tr>\n<tr>\n<td>3b. propose_new</td>\n<td>草拟新 SKU/SOP/Ratio</td>\n</tr>\n<tr>\n<td>4. Glossary</td>\n<td>新词 → maintainer 审 → append</td>\n</tr>\n<tr>\n<td>5. Validate</td>\n<td>跑 3 个校验脚本 → 报告</td>\n</tr>\n<tr>\n<td>6. Cross-CLI review</td>\n<td>按矩阵触发跨家族二审</td>\n</tr>\n</tbody></table>\n<h2>7 条硬规则</h2>\n<p>skill 必须遵守:</p>\n<ol>\n<li><strong>不许擅自写文件</strong>（每次写入前展示草稿）</li>\n<li><strong>新条目 status = proposed</strong>（不是 draft；自动进告示栏）</li>\n<li><strong>glossary 是术语护栏</strong>（不许擅自翻译）</li>\n<li><strong>双语强制</strong>（zh + en 双填）</li>\n<li><strong>校验闭环</strong>（写完跑 3 个脚本，失败回滚）</li>\n<li><strong>不许 git 操作</strong>（输出 commit message 让人手动执行）</li>\n<li><strong>不许调外部 API</strong>（模型在 maintainer 的 CLI 里）</li>\n</ol>\n<h2>为什么这样设计</h2>\n<h3>为什么 AI 不在仓库里跑？</h3>\n<ul>\n<li>不要 API key 管理负担</li>\n<li>maintainer 自己选模型（成本 / 中英能力 / 隐私）</li>\n<li>项目长寿：AI 服务商变迁不影响仓库</li>\n</ul>\n<h3>为什么必须人工逐文件确认？</h3>\n<ul>\n<li>AI 偶尔会幻觉（错菜系、错术语、错配料）</li>\n<li>maintainer 是审美主导，AI 是劳动力</li>\n<li>慢 30 秒，省 30 天纠错</li>\n</ul>\n<h3>为什么强制双语？</h3>\n<ul>\n<li>glossary 只在两端都全才能闭环</li>\n<li>公网读者很多是双语阅读者</li>\n<li>强迫 AI 双填减少&quot;自由发挥乱译&quot;</li>\n</ul>\n<h3>为什么跨 CLI 二审？</h3>\n<ul>\n<li>同模型家族容易共谋同一种偏见</li>\n<li>跨家族（Anthropic ↔ OpenAI ↔ Google ↔ DeepSeek）能交叉验证</li>\n<li>比让一个模型&quot;自己审自己&quot;靠谱</li>\n</ul>\n<h2>试一试</h2>\n<p>确认你装好了一个 agentic CLI（推荐 Cline + DeepSeek，中文场景最佳），然后:</p>\n<pre><code class=\"language-text\">&gt; /add-dish 红烧肉饭\n</code></pre>\n<p>skill 会跟你 5 步交互式确认。第一次跑可能花 15 分钟（你需要看每个草稿）；熟了之后 5 分钟搞定一道。</p>\n","lang":"zh"},"zh/ai/using-claude-code":{"title":"用 Claude Code 跑 LK / Using Claude Code","html":"<h1>用 Claude Code 跑 LK / Using Claude Code</h1>\n<p>如果你用 Claude Code，本仓库已经原生支持 <code>add-dish</code> skill。</p>\n<h2>安装</h2>\n<p>详见 <a href=\"https://claude.com/claude-code\">https://claude.com/claude-code</a></p>\n<h2>调用</h2>\n<p>进入仓库根目录，启动 Claude Code:</p>\n<pre><code class=\"language-bash\">cd lazy-kitchen\nclaude\n</code></pre>\n<p>然后:</p>\n<pre><code class=\"language-text\">&gt; /add-dish 红烧肉饭\n</code></pre>\n<p>Claude Code 会自动加载 <code>.claude/skills/add-dish/SKILL.md</code>，按 5 + 1 步交互式执行。</p>\n<h2>常用提示</h2>\n<ul>\n<li>想跳过 Step 6 跨 CLI 审稿: <code>/add-dish 红烧肉饭 skip-review</code></li>\n<li>想纯本地草稿（不进告示栏）: 跑完后手动改 yaml 里的 <code>status</code> 从 <code>proposed</code> 回 <code>draft</code></li>\n<li>想批量审已存在的 draft: <code>/review-drafts</code>（注：v1 暂未实现，可手动让 add-dish 在已有 yaml 上重跑 Step 6）</li>\n</ul>\n<h2>Claude Code 的局限（中文场景）</h2>\n<p>Claude Code 默认走 Anthropic 模型；中文菜系细节有时不如 DeepSeek 精准。建议:</p>\n<ul>\n<li>中文重场景：换用 <a href=\"#/zh/ai/choose-your-ai\">Cline + DeepSeek</a></li>\n<li>跨 CLI 二审：在 Cline 写完后，开 Claude Code 跑 review（用 review-prompt.md）</li>\n</ul>\n<p>详见 <a href=\"#/zh/ai/choose-your-ai\">选你的 AI</a>。</p>\n","lang":"zh"},"zh/board/contributing":{"title":"怎么参与 / How to participate","html":"<h1>怎么参与 / How to participate</h1>\n<p>懒蛋厨房 是 <strong>maintainer 主导 + 社区共建</strong> 的项目。\n不论你的厨艺水平如何，下面任何一种参与都欢迎。</p>\n<h2>三种参与方式</h2>\n<h3>A. 用 Giscus 投票 / 评论（最低门槛）</h3>\n<p>每道菜的页面底部嵌入了 GitHub Discussions。你可以:</p>\n<ul>\n<li>👍 / 👎 一键投票</li>\n<li>留中英文评论（&quot;这道菜的醋应该用 cane vinegar 而不是 rice vinegar&quot;）</li>\n<li>看其他人的讨论</li>\n</ul>\n<p><strong>前提</strong>：登录 GitHub 账号（一次注册，永久使用）。</p>\n<h3>B. 提 GitHub Issue（中等门槛）</h3>\n<p>适合系统性反馈:</p>\n<table>\n<thead>\n<tr>\n<th>Issue 类型</th>\n<th>例子</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>菜系不准</td>\n<td>&quot;这不是正宗韩式酱蟹，韩国人不会用 X 调料&quot;</td>\n</tr>\n<tr>\n<td>术语错</td>\n<td>&quot;glossary 里 &#39;老抽&#39; 翻成 dark soy sauce 没问题，但 alias_en 应加 &#39;sweet dark soy&#39;&quot;</td>\n</tr>\n<tr>\n<td>硬件需求漏标</td>\n<td>&quot;这道菜其实需要烤箱，hardware_extension 没列&quot;</td>\n</tr>\n<tr>\n<td>时间不实</td>\n<td>&quot;20 分钟 hands_on 做不出来，应该 35 分钟&quot;</td>\n</tr>\n<tr>\n<td>食安风险</td>\n<td>&quot;真空袋的耐温没说清楚，新手可能用错&quot;</td>\n</tr>\n<tr>\n<td>翻译质量</td>\n<td>&quot;英文步骤翻译有歧义&quot;</td>\n</tr>\n</tbody></table>\n<p>→ 在 GitHub repo 的 Issues 标签页提即可。</p>\n<h3>C. 提 GitHub PR（高门槛）</h3>\n<p>直接改 yaml + docs，maintainer review 后 merge。适合:</p>\n<ul>\n<li>加新菜（自己跑过 add-dish skill 后）</li>\n<li>修术语</li>\n<li>改 SOP 步骤</li>\n<li>加 buying_guide 细节</li>\n<li>修翻译</li>\n</ul>\n<p>PR 要遵守:</p>\n<ul>\n<li>通过 <code>bun run scripts/validate-data.ts</code></li>\n<li>通过 <code>bun run scripts/lint-bilingual.ts</code></li>\n<li>跨 CLI 二审过（理想）或在 PR 里说明跳过原因</li>\n</ul>\n<h2>maintainer 怎么处理反馈</h2>\n<pre><code class=\"language-text\">GitHub Discussions 评论     →  maintainer 个人判断 → 改 yaml → push\nGitHub Issue                →  maintainer 评估 → label / fix / close\nGitHub PR                   →  review → 改 yaml 验证 → merge or request changes\n</code></pre>\n<p>回复时间不保证。这是个人项目。</p>\n<h2>上限</h2>\n<ul>\n<li>不接受&quot;我觉得这道菜应该叫 XXX 才对&quot; 的纯品味争论（建议另开 fork）</li>\n<li>不接受&quot;加这个酱料、加那个酱料&quot;的功能蔓延（违反&quot;硬件极简&quot;原则）</li>\n<li>不接受&quot;做个 App 吧&quot; 的转方向请求（这就是个静态站 + skill）</li>\n</ul>\n<h2>你能做主的范围</h2>\n<ul>\n<li>你 fork 后可以加任何菜，状态可以全部 approved，让你自己用</li>\n<li>你不需要把改动 merge 回主仓库</li>\n<li>主仓库只是&quot;懒蛋厨房 official 视角&quot;；你的厨房是你的厨房</li>\n</ul>\n","lang":"zh"},"zh/board/history":{"title":"全部历史 / Full history","html":"<h1>全部历史 / Full history</h1>\n<blockquote>\n<p>所有菜的 status 流转记录。</p>\n</blockquote>\n<p>由 <code>bun run scripts/build-html.ts</code> 从 git log + dishes.yaml 状态对比生成。</p>\n","lang":"zh"},"zh/board/index":{"title":"告示栏 / Bulletin Board","html":"<h1>告示栏 / Bulletin Board</h1>\n<p>这里是 LK 社区共建的中心。所有新菜、所有讨论、所有迭代都在这里发生。</p>\n<h2>现状</h2>\n<ul>\n<li>看 <a href=\"#/zh/board/proposed\">proposed</a> — 当前 maintainer 在试验、邀请反馈的菜</li>\n<li>看 <a href=\"#/zh/board/recent\">recent</a> — 最近 30 天升级到 approved 的菜</li>\n<li>看 <a href=\"#/zh/board/history\">history</a> — 历史所有 status 流转记录</li>\n<li>学 <a href=\"#/zh/board/contributing\">contributing</a> — 怎么参与（投票、评论、Issue、PR）</li>\n</ul>\n<h2>状态机</h2>\n<pre><code class=\"language-text\">planned (路线图占位)\n   ↓ maintainer 跑 /add-dish 起草\nproposed (告示栏公开，社区评议)\n   ↓ 共识 + 跨 CLI 审通过\nreview (准备最终审)\n   ↓ maintainer 最终拍板\napproved (正式发布)\n   ↓ 被新版替代\ndeprecated\n</code></pre>\n<p>每个状态对应不同颜色徽章在 dish 页顶部显示。</p>\n<h2>你可以做的事</h2>\n<ul>\n<li>看到感兴趣的 proposed 菜 → 点进去 → 在 Giscus 投票或评论</li>\n<li>看到 approved 菜也可继续评论 / 提改进建议</li>\n<li>想加一道完全没人提过的菜 → 提 Issue 求 maintainer 安排，或自己 fork + 跑 skill + 提 PR</li>\n</ul>\n","lang":"zh"},"zh/board/proposed":{"title":"待审议 / Proposed","html":"<h1>待审议 / Proposed</h1>\n<blockquote>\n<p>这里列出当前 <code>status: proposed</code> 的所有菜。由 <code>bun run scripts/build-html.ts</code> 自动从 <code>data/dishes.yaml</code> 生成。</p>\n</blockquote>\n<p>每道菜旁边的徽章显示当前状态。点击进入详情，在底部 Giscus 投票或评论。</p>\n<div class=\"grid-4\">\n    <div class=\"stat-card stat-card--approved\">\n      <div class=\"stat-card__num\">1</div>\n      <div class=\"stat-card__label\">已发布</div>\n      <div class=\"stat-card__sub\">本周</div>\n    </div>\n    <div class=\"stat-card stat-card--proposed\">\n      <div class=\"stat-card__num\">0</div>\n      <div class=\"stat-card__label\">待审议</div>\n      <div class=\"stat-card__sub\">征集反馈</div>\n    </div>\n    <div class=\"stat-card stat-card--muted\">\n      <div class=\"stat-card__num\">60</div>\n      <div class=\"stat-card__label\">路线图</div>\n      <div class=\"stat-card__sub\">占位中</div>\n    </div>\n    <div class=\"stat-card\">\n      <div class=\"stat-card__num\">—</div>\n      <div class=\"stat-card__label\">评论</div>\n      <div class=\"stat-card__sub\">由 Giscus 收集</div>\n    </div>\n  </div><h2>🍳 待审议</h2><div class=\"empty\"><div class=\"empty__title\">当前没有待审议菜品。</div><div class=\"empty__sub\">稍后再来。</div></div><h2>✅ 已发布 <span class=\"muted\" style=\"font-size:0.6em;font-weight:500\">(1)</span></h2>\n            <div class=\"grid-3\"><a class=\"dish-card\" href=\"#/zh/compose/cn-canton-clear-beef-noodles\">\n    <div class=\"dish-card__top\">\n      <span class=\"status-badge status-badge--approved\">APPROVED</span>\n      <span class=\"chip chip--default\">CN · 粤</span>\n      <span class=\"dish-card__id\">DISH-CN-CANTON-CLEAR-BEEF-NOODLES</span>\n    </div>\n    <h3 class=\"dish-card__title\">清汤牛腩粉</h3>\n    <p class=\"dish-card__subtitle\">Cantonese clear-broth beef brisket rice noodles</p>\n    <div class=\"dish-card__meta\">\n      <span class=\"dish-card__time\">25</span>\n      <span class=\"dish-card__time-unit\">min hands-on · 160 min total</span>\n    </div>\n    <div class=\"dish-card__tags\"><span class=\"chip chip--default\">clear</span><span class=\"chip chip--default\">umami</span><span class=\"chip chip--default\">light</span></div>\n    <div class=\"dish-card__divider\"></div>\n    <div class=\"dish-card__sku\">\n      <span class=\"dish-card__sku-label\"> >\n      <span class=\"dish-card__id\">DISH-MX-MOLE-POBLANO</span>\n    </div>\n    <h3 class=\"dish-card__title\">墨西哥莫雷酱鸡</h3>\n    <p class=\"dish-card__subtitle\">Mole Poblano</p>\n    \n    \n    <div class=\"dish-card__divider\"></div>\n    <div class=\"dish-card__sku\">\n      <span class=\"dish-card__sku-label\">USES</span>\n      <span class=\"dish-card__sku-id\">COOKED-MX-MOLE-v1</span>\n    </div>\n  </a><a class=\"dish-card\" href=\"#/zh/compose/us-southern-fried-chicken\">\n    <div class=\"dish-card__top\">\n      <span class=\"status-badge status-badge--planned\">PLANNED</span>\n      <span class=\"chip chip--default\">US · 美南</span>\n      <span class=\"dish-card__id\">DISH-US-SOUTHERN-FRIED-CHICKEN</span>\n    </div>\n    <h3 class=\"dish-card__title\">美南南方炸鸡</h3>\n    <p class=\"dish-card__subtitle\">Southern fried chicken</p>\n    \n    \n    <div class=\"dish-card__divider\"></div>\n    <div class=\"dish-card__sku\">\n      <span class=\"dish-card__sku-label\">USES</span>\n      <span class=\"dish-card__sku-id\">DRY-US-SOUTHERN-v1</span>\n    </div>\n  </a><a class=\"dish-card\" href=\"#/zh/compose/br-feijoada\">\n    <div class=\"dish-card__top\">\n      <span class=\"status-badge status-badge--planned\">PLANNED</span>\n      <span class=\"chip chip--default\">BR · 巴西</span>\n      <span class=\"dish-card__id\">DISH-BR-FEIJOADA</span>\n    </div>\n    <h3 class=\"dish-card__title\">巴西黑豆肉炖</h3>\n    <p class=\"dish-card__subtitle\">Feijoada</p>\n    \n    \n    <div class=\"dish-card__divider\"></div>\n    <div class=\"dish-card__sku\">\n      <span class=\"dish-card__sku-label\">USES</span>\n      <span class=\"dish-card__sku-id\">DRY-BR-FEIJOADA-v1</span>\n    </div>\n  </a><a class=\"dish-card\" href=\"#/zh/compose/pe-lomo-saltado\">\n    <div class=\"dish-card__top\">\n      <span class=\"status-badge status-badge--planned\">PLANNED</span>\n      <span class=\"chip chip--default\">PE · 秘鲁</span>\n      <span class=\"dish-card__id\">DISH-PE-LOMO-SALTADO</span>\n    </div>\n    <h3 class=\"dish-card__title\">秘鲁炒牛肉</h3>\n    <p class=\"dish-card__subtitle\">Lomo Saltado</p>\n    \n    \n    <div class=\"dish-card__divider\"></div>\n    <div class=\"dish-card__sku\">\n      <span class=\"dish-card__sku-label\">USES</span>\n      <span class=\"dish-card__sku-id\">—</span>\n    </div>\n  </a><a class=\"dish-card\" href=\"#/zh/compose/ar-asado-chimichurri\">\n    <div class=\"dish-card__top\">\n      <span class=\"status-badge status-badge--planned\">PLANNED</span>\n      <span class=\"chip chip--default\">AR · 阿根廷</span>\n      <span class=\"dish-card__id\">DISH-AR-ASADO-CHIMICHURRI</span>\n    </div>\n    <h3 class=\"dish-card__title\">阿根廷烤肉 + 香草酱</h3>\n    <p class=\"dish-card__subtitle\">Argentinian asado with chimichurri</p>\n    \n    \n    <div class=\"dish-card__divider\"></div>\n    <div class=\"dish-card__sku\">\n      <span class=\"dish-card__sku-label\">USES</span>\n      <span class=\"dish-card__sku-id\">WET-AR-CHIMICHURRI-v1</span>\n    </div>\n  </a></div>","lang":"zh"},"zh/board/recent":{"title":"最近发布 / Recently approved","html":"<h1>最近发布 / Recently approved</h1>\n<blockquote>\n<p>自动列出最近 30 天 status 升级到 approved 的菜。</p>\n</blockquote>\n<p>由 <code>bun run scripts/build-html.ts</code> 从 git log + dishes.yaml 生成。</p>\n","lang":"zh"},"zh/buy/buying-guide":{"title":"采购总论 / Buying guide overview","html":"<h1>采购总论 / Buying guide overview</h1>\n<p>按三种节奏组织你的采购:</p>\n<h2>1. 常备 (<code>bulk_pantry</code>) — 大瓶 / 大包</h2>\n<p>例子: 盐、生抽、米、蒜、洋葱、整香料</p>\n<ul>\n<li>优点：单价低、几个月不用补</li>\n<li>缺点：占地</li>\n<li>建议：核心 20 项，长期备</li>\n</ul>\n<h2>2. 阶段性大量 (<code>seasonal_buy</code>) — 中等批量</h2>\n<p>例子: garam masala、特色酱、特定香料、cassia bark</p>\n<ul>\n<li>优点：按周期补</li>\n<li>缺点：易过期变味</li>\n<li>建议：开新菜系前一次补全</li>\n</ul>\n<h2>3. 按需小量 (<code>on_demand_online</code>) — 网购小份</h2>\n<p>例子: 柠檬汁瓶、香茅、南姜、特殊干菇</p>\n<ul>\n<li>优点：不囤，用多少买多少</li>\n<li>缺点：单价高</li>\n<li>建议：偏门菜临时用，不要大量买</li>\n</ul>\n<h2>各层详细</h2>\n<ul>\n<li><a href=\"#/zh/buy/ingredients\">基础食材采购</a></li>\n<li><a href=\"#/zh/buy/fresh-aromatics\">生鲜香辛</a></li>\n<li><a href=\"#/zh/buy/condiments\">基础调料</a></li>\n<li><a href=\"#/zh/buy/dry-pantry\">干货母库</a></li>\n<li><a href=\"#/zh/buy/hardware-guide\">硬件采购指南</a></li>\n<li><a href=\"#/zh/buy/consumables-guide\">耗材采购指南</a></li>\n</ul>\n<h2>中国电商优势</h2>\n<p>家里硬件可以极简到 10 件，原因之一就是中国电商能买切好的肉、剔骨的鸡腿、切丝的白萝卜。</p>\n<p>每个 ingredient 条目带 <code>cn_market_pre_prepped[]</code>，列出常见预处理形态。下单时按这个买，能省 hands_on_min。</p>\n<h2>不买什么</h2>\n<ul>\n<li>不买&quot;全套 60 种香料礼盒&quot; —— 大部分一年用 1 次</li>\n<li>不买&quot;一组多用神器&quot; —— 通常每个功能都不够用</li>\n<li>不买&quot;网红厨房机器人&quot; —— 占地大，洗起来费时</li>\n</ul>\n","lang":"zh"},"zh/buy/condiments":{"title":"基础调料 / Base condiments","html":"<h1>基础调料 / Base condiments</h1>\n<p>详见 <a href=\"../../../data/condiments.yaml\">data/condiments.yaml</a>。</p>\n<p>大瓶 / 大袋常备，不分装为 SKU。</p>\n<h2>速览（~20 项）</h2>\n<ul>\n<li><strong>咸鲜</strong>: 生抽、老抽、蚝油、鱼露、盐</li>\n<li><strong>酸</strong>: 米醋、黑醋、柠檬汁</li>\n<li><strong>甜</strong>: 白糖、冰糖、蜂蜜</li>\n<li><strong>油</strong>: 食用油、芝麻油、橄榄油</li>\n<li><strong>酱</strong>: 郫县豆瓣酱、味噌、韩式辣酱、泰式红/绿咖喱酱</li>\n<li><strong>罐头</strong>: 番茄罐头、椰浆</li>\n</ul>\n<p>详见 yaml；术语对照见 <a href=\"#/zh/glossary\">glossary</a>。</p>\n","lang":"zh"},"zh/buy/consumables-guide":{"title":"耗材采购指南 / Consumables buying guide","html":"<h1>耗材采购指南 / Consumables buying guide</h1>\n<p>LK 用到的非器具耗材，全部带食安考量:</p>\n<h2>HW-VACUUM-BAGS / 真空袋</h2>\n<p>详见 <a href=\"../../../data/hardware.yaml\">data/hardware.yaml</a> HW-VACUUM-BAGS 条目。</p>\n<p><strong>关键</strong>:</p>\n<ul>\n<li>厚度 90 微米起步（90/100/120 三档主流）</li>\n<li>单面光滑+单面纹路（&quot;channel/网纹&quot;）才配家用机；纯光滑只能配腔体机</li>\n<li><strong>必须 BPA-free 食品级</strong></li>\n<li>不可微波；冷冻+沸水加热看耐温标</li>\n<li><strong>已用包装不可二次封</strong>（交叉污染）</li>\n</ul>\n<p>价位：一卷 25×500cm，30–80 元。</p>\n<h2>HW-SPICE-SACHETS / 茶包袋</h2>\n<ul>\n<li>食品级无纺布（PP / 玉米纤维），耐沸水</li>\n<li>抽绳款比订口好用</li>\n<li>6×8cm + 8×12cm 各备一包</li>\n<li><strong>PE 塑料茶包袋遇高温析出 → 勿用</strong></li>\n<li>真空封外袋之前先把香料装入茶包袋（避免颗粒被吸入封口机）</li>\n</ul>\n<h2>HW-FREEZER-LABELS / 冷冻标签</h2>\n<ul>\n<li>必须冷冻防水（普通快递贴纸冻 1 周脱胶）</li>\n<li>配油性笔（zebra mckee / sharpie）</li>\n<li>双面标签纸（前撕后揭）方便贴</li>\n</ul>\n<h2>推荐标签内容</h2>\n<pre><code>[SKU id]\n[制作日期]\n[批次号]\n[建议使用前]\n</code></pre>\n<p>详见 SOP-LABELING-001（add-dish 时会被引用）。</p>\n","lang":"zh"},"zh/buy/dry-pantry":{"title":"干货母库 / Dry pantry","html":"<h1>干货母库 / Dry pantry</h1>\n<p>详见 <a href=\"../../../data/dry-pantry.yaml\">data/dry-pantry.yaml</a>。</p>\n<p>这一层是 LK 的策略核心 —— <strong>大批量采购干香料 + 按 SKU 公式分装</strong>。</p>\n<h2>整香料</h2>\n<p>八角、香叶、桂皮、白胡椒粒、花椒、陈皮、干辣椒</p>\n<h2>粉香料</h2>\n<p>孜然粉、甜椒粉、烟熏甜椒粉、辣椒粉、咖喱粉、姜黄粉、蒜粉、洋葱粉、黑胡椒粉、白胡椒粉</p>\n<h2>干鲜</h2>\n<p>出汁粉、干香菇、海带芽、海带</p>\n<h2>关键</h2>\n<ul>\n<li>整香料密封避光 → 风味期 1–3 年</li>\n<li>粉香料 6–12 个月开始走味</li>\n<li>大批量 + 合理周期使用 = 单价低 + 风味好</li>\n</ul>\n<h2>工作流</h2>\n<p>阶段 ② 采购期：按你这个月想做的菜，一次性补 dry-pantry 缺口。\n阶段 ③ 制备期：按 DRY SKU 公式（如 <a href=\"#/zh/pack/dry/canton-clear-beef\">DRY-CANTON-CLEAR-BEEF-v1</a>）混合 → 茶包袋 → 真空。</p>\n","lang":"zh"},"zh/buy/fresh-aromatics":{"title":"生鲜香辛 / Fresh aromatics","html":"<h1>生鲜香辛 / Fresh aromatics</h1>\n<p>详见 <a href=\"../../../data/fresh-aromatics.yaml\">data/fresh-aromatics.yaml</a>。</p>\n<h2>三档</h2>\n<h3>常备</h3>\n<p>姜、蒜、葱（高频，几乎每菜都用）</p>\n<h3>按需买</h3>\n<p>香菜、青柠、薄荷、罗勒、泰国九层塔</p>\n<h3>MVP 不囤（特殊场景才买）</h3>\n<p>香茅、南姜、柠檬叶 — 中国家庭少有；MVP 阶段建议用商业咖喱酱替代</p>\n","lang":"zh"},"zh/buy/hardware-guide":{"title":"硬件采购指南 / Hardware buying guide","html":"<h1>硬件采购指南 / Hardware buying guide</h1>\n<p>详见 <a href=\"../../../data/hardware.yaml\">data/hardware.yaml</a>（每件硬件的完整 buying_guide 字段）。</p>\n<h2>10 件套 MVP</h2>\n<table>\n<thead>\n<tr>\n<th>ID</th>\n<th>名称</th>\n<th>价位 (CNY)</th>\n<th>重点</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>HW-CHEF-KNIFE</td>\n<td>主厨刀</td>\n<td>150–800</td>\n<td>20cm 锻造刀身</td>\n</tr>\n<tr>\n<td>HW-CLEAVER</td>\n<td>中式菜刀</td>\n<td>100–500</td>\n<td>文武刀（中等厚度）400–500g</td>\n</tr>\n<tr>\n<td>HW-WOK-OR-SKILLET</td>\n<td>炒锅</td>\n<td>150–400 (碳钢)</td>\n<td>直径 30–34cm</td>\n</tr>\n<tr>\n<td>HW-SOUP-POT</td>\n<td>汤锅</td>\n<td>200–600 (钢)</td>\n<td>5L 起步</td>\n</tr>\n<tr>\n<td>HW-MEASURING-SPOONS</td>\n<td>量勺</td>\n<td>30–80</td>\n<td>不锈钢 4–6 件套</td>\n</tr>\n<tr>\n<td>HW-KITCHEN-SCALE</td>\n<td>厨房秤</td>\n<td>60–200</td>\n<td>0.1g 精度</td>\n</tr>\n<tr>\n<td>HW-VACUUM-SEALER</td>\n<td>真空封袋器</td>\n<td>200–600</td>\n<td>必须支持湿物模式</td>\n</tr>\n<tr>\n<td>HW-VACUUM-BAGS</td>\n<td>真空袋</td>\n<td>一卷 30–80</td>\n<td>90+μ BPA-free</td>\n</tr>\n<tr>\n<td>HW-SPICE-SACHETS</td>\n<td>茶包袋</td>\n<td>100 个 10–25</td>\n<td>食品级 PP，抽绳</td>\n</tr>\n<tr>\n<td>HW-FREEZER-LABELS</td>\n<td>冷冻标签</td>\n<td>一卷 15–30</td>\n<td>防水冷冻级</td>\n</tr>\n</tbody></table>\n<h2>详细字段</h2>\n<p>每件硬件 yaml 包含：</p>\n<ul>\n<li><code>buying_guide.key_considerations</code> — 选购要点</li>\n<li><code>buying_guide.spec_hint</code> — 规格建议</li>\n<li><code>buying_guide.food_safety</code> — 食安风险</li>\n<li><code>buying_guide.common_pitfalls</code> — 常见坑</li>\n<li><code>buying_guide.price_band_cny</code> — 价位区间</li>\n</ul>\n<p>直接读 yaml 比看本页更详细。</p>\n<h2>非 MVP 设备</h2>\n<p>详见 <a href=\"../../../data/hardware-extensions.yaml\">hardware-extensions.yaml</a>：烤箱、电饭煲、高压锅、蒸笼、空气炸锅、手持搅拌棒、探针温度计。</p>\n<p>每件标 <code>why</code>（什么菜要它）+ <code>workaround</code>（不买怎么替代）。</p>\n","lang":"zh"},"zh/buy/ingredients":{"title":"基础食材 / Base ingredients","html":"<h1>基础食材 / Base ingredients</h1>\n<p>详见数据真源 <a href=\"../../../data/ingredients.yaml\">data/ingredients.yaml</a>。</p>\n<h2>关键观念</h2>\n<ul>\n<li>蛋白质和蔬菜不预制（保留人参与感）</li>\n<li>中国电商可买预切：每个条目带 <code>cn_market_pre_prepped[]</code></li>\n<li>按 <code>procurement_mode</code> 区分采购节奏</li>\n</ul>\n<h2>速览（核心 ~20 项）</h2>\n<h3>蛋白质</h3>\n<p>鸡蛋、豆腐、鸡腿肉、五花肉、牛腩、猪肉片、牛肉片、虾仁、鱼片</p>\n<h3>蔬菜</h3>\n<p>洋葱、白萝卜、卷心菜、青菜、蘑菇、胡萝卜、土豆、番茄</p>\n<h3>主食</h3>\n<p>米、面条、河粉、乌冬、意面</p>\n<p>完整字段（中英名 / aliases / 储藏 / 采购模式 / 中国预切 / buying_notes）见 yaml。</p>\n","lang":"zh"},"zh/compose/canton-clear-beef-noodles":{"title":"清汤牛腩粉 / Cantonese clear-broth beef brisket rice noodles","html":"<h1>清汤牛腩粉 / Cantonese clear-broth beef brisket rice noodles</h1>\n<p><span class=\"status status-approved\">approved</span> <span class=\"cuisine\">粤 · CN</span></p>\n<blockquote>\n<p>✦ 端到端示例。展示&quot;DRY 包 + 多 SOP 协作&quot;的最小完整闭环。</p>\n</blockquote>\n<h2>组合公式</h2>\n<pre><code>食材\n  + DRY-CANTON-CLEAR-BEEF-v1\n  + SOP-BLANCH-MEAT-001\n  + SOP-CANTON-CLEAR-BEEF-001\n  + SOP-SOUP-NOODLE-001\n  = 一餐\n</code></pre>\n<h2>食材清单（3 人份）</h2>\n<table>\n<thead>\n<tr>\n<th>食材</th>\n<th>用量</th>\n<th>备注</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>牛腩 / Beef brisket</td>\n<td>600 g</td>\n<td>中国电商可买预切大块</td>\n</tr>\n<tr>\n<td>白萝卜 / Daikon radish</td>\n<td>600 g</td>\n<td>切大块</td>\n</tr>\n<tr>\n<td>河粉 / Rice noodles</td>\n<td>200 g</td>\n<td></td>\n</tr>\n<tr>\n<td>青菜 / Leafy greens</td>\n<td>100 g</td>\n<td>烫熟即可</td>\n</tr>\n<tr>\n<td>葱花 / Chopped scallion</td>\n<td>1 把</td>\n<td>出锅时撒</td>\n</tr>\n</tbody></table>\n<h2>时间</h2>\n<table>\n<thead>\n<tr>\n<th>段</th>\n<th>分钟</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>备菜 (prep)</td>\n<td>15</td>\n</tr>\n<tr>\n<td><strong>动手 (hands-on)</strong></td>\n<td><strong>25</strong></td>\n</tr>\n<tr>\n<td>闲置 (unattended)</td>\n<td>120</td>\n</tr>\n<tr>\n<td>总时长</td>\n<td>160</td>\n</tr>\n</tbody></table>\n<h2>风味结构 (Salt Fat Acid Heat)</h2>\n<ul>\n<li><strong>Salt</strong>: fish sauce + light soy（出锅前调）</li>\n<li><strong>Fat</strong>: 牛腩自带（无需加油）</li>\n<li><strong>Acid</strong>: null（清汤不加酸）</li>\n<li><strong>Heat</strong>: long simmer（90–150 分钟微火）</li>\n</ul>\n<h2>硬件</h2>\n<p>✅ MVP 10 件套即可（汤锅 + 主厨刀 + 茶包袋 + 真空袋）</p>\n<h2>步骤（来自 SOP-CANTON-CLEAR-BEEF-001）</h2>\n<ol>\n<li>牛腩冷水下锅，水开后焯水 3–5 分钟</li>\n<li>捞出后用温水冲洗血沫，沥干切大块（5cm 见方）</li>\n<li>汤锅注入 1.5–2L 清水，下牛腩、3 片姜、广式清汤牛腩香料包</li>\n<li>大火烧开后转微火，加盖虚掩，慢炖 90–150 分钟</li>\n<li>出锅前 25–40 分钟下白萝卜（切大块）</li>\n<li>起锅前调味：盐 + 鱼露少许 + 冰糖 5g 试味</li>\n<li>撒葱花，可配米线 / 河粉 / 米饭</li>\n</ol>\n<h2>关键要点</h2>\n<ul>\n<li>焯水必须冷水下锅，否则血沫锁在肉里</li>\n<li>微火虚掩盖以保汤清；大火翻滚 = 浑汤</li>\n<li>萝卜不要一开始就下，会发苦</li>\n<li>鱼露用量很小，目的是增鲜不夺味</li>\n</ul>\n<h2>复用</h2>\n<ul>\n<li>DRY 包同样用于：本菜唯一</li>\n<li>SOP-SOUP-NOODLE-001 复用于：日式拉面、越南河粉、川式牛肉面</li>\n<li>SOP-CLEAR-STEW-001 复用于：日式味噌汤、越南河粉汤</li>\n</ul>\n<hr>\n<blockquote>\n<p>★ 这是 <code>add-dish</code> skill 的端到端示例。所有字段 maintainer 已审 + 跨 CLI 二审过。\n见到不对的地方？在下面 Giscus 评论，或提 <a href=\"https://github.com/owner/lazy-kitchen/issues\">GitHub Issue</a>。</p>\n</blockquote>\n<div class=\"giscus-wrapper\"><div class=\"empty\">\n      <div class=\"empty__title\">💬 Discussion</div>\n      <div class=\"empty__sub\">Giscus would mount here at term=canton-clear-beef-noodles (set GISCUS_REPO_ID env to enable)</div>\n    </div></div>","lang":"zh"},"zh/cook/canton-clear-beef":{"title":"SOP-CANTON-CLEAR-BEEF-001 / 广式清汤牛腩","html":"<h1>SOP-CANTON-CLEAR-BEEF-001 / 广式清汤牛腩</h1>\n<p><span class=\"status status-approved\">approved</span></p>\n<table>\n<thead>\n<tr>\n<th>字段</th>\n<th>值</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>heat_type</td>\n<td>moist</td>\n</tr>\n<tr>\n<td>cooking_method</td>\n<td>simmer</td>\n</tr>\n<tr>\n<td>station</td>\n<td>saucier</td>\n</tr>\n<tr>\n<td>time_tier</td>\n<td>half-day</td>\n</tr>\n<tr>\n<td>heat_level</td>\n<td>simmer (微火)</td>\n</tr>\n<tr>\n<td>equipment</td>\n<td>汤锅 + 茶包袋</td>\n</tr>\n</tbody></table>\n<h2>步骤</h2>\n<ol>\n<li>牛腩冷水下锅，水开后焯水 3–5 分钟</li>\n<li>捞出后用温水冲洗血沫，沥干切大块（5cm 见方）</li>\n<li>汤锅注入 1.5–2L 清水，下牛腩、3 片姜、广式清汤牛腩香料包</li>\n<li>大火烧开后转微火，加盖虚掩，慢炖 90–150 分钟</li>\n<li>出锅前 25–40 分钟下白萝卜（切大块）</li>\n<li>起锅前调味：盐 + 鱼露少许 + 冰糖 5g 试味</li>\n<li>撒葱花，可配米线 / 河粉 / 米饭</li>\n</ol>\n<h2>关键 tips</h2>\n<ul>\n<li>焯水必须冷水下锅，否则血沫锁在肉里</li>\n<li>微火虚掩盖以保汤清；大火翻滚 = 浑汤</li>\n<li>萝卜不要一开始就下，会发苦</li>\n<li>鱼露用量很小，目的是增鲜不夺味</li>\n</ul>\n<h2>用于哪些菜</h2>\n<ul>\n<li><a href=\"#/zh/compose/canton-clear-beef-noodles\">清汤牛腩粉</a></li>\n</ul>\n<h2>真源</h2>\n<p>详见 <a href=\"../../../data/sop.yaml\">data/sop.yaml</a> 的 <code>SOP-CANTON-CLEAR-BEEF-001</code> 条目。</p>\n<div class=\"giscus-wrapper\"><div class=\"empty\">\n      <div class=\"empty__title\">💬 Discussion</div>\n      <div class=\"empty__sub\">Giscus would mount here at term=canton-clear-beef (set GISCUS_REPO_ID env to enable)</div>\n    </div></div>","lang":"zh"},"zh/cook/doneness":{"title":"断生判断 / Doneness","html":"<h1>断生判断 / Doneness</h1>\n<p>&quot;什么时候熟了？&quot; 是真正难传的隐性知识。LK 给一份速查表。</p>\n<h2>内温法（最准）</h2>\n<p>需要 <a href=\"#/zh/buy/hardware-guide\">HW-INSTANT-THERMOMETER</a>。</p>\n<table>\n<thead>\n<tr>\n<th>食材</th>\n<th>内温</th>\n<th>状态</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>牛排 (rare)</td>\n<td>49–54°C</td>\n<td>中心鲜红</td>\n</tr>\n<tr>\n<td>牛排 (medium)</td>\n<td>60–63°C</td>\n<td>中心粉红</td>\n</tr>\n<tr>\n<td>牛排 (well done)</td>\n<td>71°C+</td>\n<td>全灰</td>\n</tr>\n<tr>\n<td>鸡肉 (安全线)</td>\n<td>74°C</td>\n<td>不可低于</td>\n</tr>\n<tr>\n<td>猪肉 (安全线)</td>\n<td>63°C + 3min 静置</td>\n<td></td>\n</tr>\n<tr>\n<td>鱼 (大部分)</td>\n<td>52–55°C</td>\n<td></td>\n</tr>\n<tr>\n<td>三文鱼 (medium)</td>\n<td>49–52°C</td>\n<td></td>\n</tr>\n</tbody></table>\n<h2>视觉法</h2>\n<ul>\n<li><strong>鸡肉</strong>: 切开看汁色 — 透明 = 熟，粉红 = 没熟</li>\n<li><strong>虾</strong>: 弯成 C 形 = 熟，O 形 = 老</li>\n<li><strong>鱼</strong>: 用筷子戳 — 自然分层（layered flake）= 熟</li>\n<li><strong>意面</strong>: 切开横截面 — 中心无白点 = al dente</li>\n<li><strong>米饭</strong>: 锅边干 + 中心松 = 熟</li>\n</ul>\n<h2>时间法（不准但够用）</h2>\n<ul>\n<li>鸡腿肉炖 30+ min 一定熟</li>\n<li>牛腩炖 1.5–2.5 小时 = 软烂</li>\n<li>米饭电饭煲跳到保温即可</li>\n</ul>\n<h2>闻 / 听</h2>\n<ul>\n<li>油炸：声音从大滋滋转到细密 = 内部水蒸气出尽 = 接近熟</li>\n<li>烤肉：油脂滴下烟气显著 = 表层焦化中</li>\n</ul>\n<h2>不靠谱的方法</h2>\n<ul>\n<li>❌ &quot;XX 分钟&quot; 死记 — 锅温、肉块大小都影响</li>\n<li>❌ &quot;颜色&quot; 只看外面 — 内里可能没熟</li>\n<li>❌ 红外测温枪测肉 — 只测表面</li>\n</ul>\n<h2>安全底线</h2>\n<ul>\n<li>鸡肉、整禽、绞肉、鱼贝若有怀疑 → 多煮 1 分钟比生冒险好</li>\n<li>不靠&quot;我相信我的眼睛&quot; 替代温度计</li>\n</ul>\n","lang":"zh"},"zh/cook/index":{"title":"工艺 / SOPs","html":"<h1>工艺 / SOPs</h1>\n<p>详见 <a href=\"../../../data/sop.yaml\">data/sop.yaml</a>（22 个 SOP，1 个全填: 广式清汤牛腩）。</p>\n<h2>分类速览</h2>\n<p>按 CIA 烹饪法分类:</p>\n<h3>湿热 (moist)</h3>\n<ul>\n<li>BLANCH-MEAT, CLEAR-STEW, BRAISE, SOUP-NOODLE, COOKED-BASE</li>\n</ul>\n<h3>干热 (dry)</h3>\n<ul>\n<li>STIR-FRY, PAN-SEAR</li>\n</ul>\n<h3>组合 (combination)</h3>\n<ul>\n<li>BRAISE (含 hongshao), 部分 stew</li>\n</ul>\n<h3>工艺 (prep / package)</h3>\n<ul>\n<li>CUT-* (julienne, dice, mince, rollblock)</li>\n<li>MARINATE-* (wet, dry-rub, velvet)</li>\n<li>VACUUM-DRY, VACUUM-LIQUID, REHEAT, LABELING</li>\n<li>CLEAN-WOK-HOT</li>\n<li>OPTIMIZE-* (parallel, overlap, sku-ahead, batch-prep)</li>\n</ul>\n<h2>端到端示例</h2>\n<p><a href=\"#/zh/cook/canton-clear-beef\">SOP-CANTON-CLEAR-BEEF-001</a> — 完整 7 步 + 4 条 tips，双语。</p>\n<h2>分站 (Brigade station)</h2>\n<p>每个 SOP 带 <code>station</code> 字段（garde-manger / saucier / saute / grill / fry / pastry / none），便于规划多炉灶并行。</p>\n<h2>时长档位</h2>\n<p>每个 SOP 带 <code>time_tier</code> (5m / 15m / 30m / 1h / half-day / overnight)。</p>\n<h2>中国电商加速</h2>\n<p>CUT-* 系列默认 <code>optional_if_pre_prepped: true</code> —— 买切好的肉/菜可跳过这些 SOP。</p>\n","lang":"zh"},"zh/cook/mise-en-place":{"title":"备菜纪律 / Mise en place","html":"<h1>备菜纪律 / Mise en place</h1>\n<blockquote>\n<p>Escoffier 的厨房纪律：<strong>所有材料就位后再开火</strong>。</p>\n</blockquote>\n<h2>为什么</h2>\n<ul>\n<li>中餐快炒尤其严格 — 锅一热下去，再切就晚了</li>\n<li>减少操作中&quot;哎呀忘了...&quot; 的崩溃时刻</li>\n<li>让 hands_on_min 真的接近 yaml 标的数</li>\n</ul>\n<h2>做法</h2>\n<h3>开火前</h3>\n<ol>\n<li>看完整个 SOP</li>\n<li>列所有需要的食材 + 调料 + SKU 包</li>\n<li>全部切配 / 量好 / 装小碟摆好</li>\n<li>准备好成品装载容器（盘子或碗）</li>\n<li>抹布、隔热垫、铲子在伸手可及处</li>\n</ol>\n<h3>装碟方式</h3>\n<pre><code class=\"language-text\">小碟 1: 蒜末 + 姜末 + 葱花 (一锅入)\n小碟 2: 肉片 + 腌料 (单独)\n小碟 3: 蔬菜（按下锅顺序排）\n小碟 4: 调味（生抽 + 醋 + 糖，先量好）\n小碟 5: 收尾（淀粉水 + 香油，临出锅用）\n</code></pre>\n<h3>然后才开火</h3>\n<p>按 SOP 步骤推进。不打开微信，不接电话。</p>\n<h2>中式 SKU 的好处</h2>\n<p>如果用了 LK 的 DRY/WET 包：</p>\n<ul>\n<li>DRY 包就是你的 &quot;调料碟&quot; 缩成一袋</li>\n<li>WET 包就是你的 &quot;腌料碟&quot; 缩成一份</li>\n<li>切配（CUT-*）大部分可由生鲜电商代劳</li>\n</ul>\n<p>→ mise en place 时间可压缩到 5 分钟。</p>\n","lang":"zh"},"zh/glossary":{"title":"中英术语表 / Bilingual glossary","html":"<h1>中英术语表 / Bilingual glossary</h1>\n<blockquote>\n<p>真源在 <code>data/glossary.yaml</code>，本页是其可读镜像。\nAI 翻译护栏：任何调料 / 食材 / 工艺出现在 yaml 之前，必须在 glossary 查得到。</p>\n</blockquote>\n<h2>为什么这页存在</h2>\n<p>中餐英译有大量陷阱:</p>\n<ul>\n<li><strong>大料</strong> ≠ &quot;big spice&quot; → <strong>Star anise</strong></li>\n<li><strong>花椒</strong> ≠ &quot;black pepper&quot; → <strong>Sichuan peppercorn</strong></li>\n<li><strong>生抽</strong> ≠ &quot;soy sauce&quot; 笼统 → <strong>Light soy sauce</strong>（与老抽区分）</li>\n<li><strong>南姜</strong> ≠ &quot;ginger&quot; → <strong>Galangal</strong></li>\n</ul>\n<p>LK 把每条对应关系固化下来，AI 调 add-dish skill 时必须查 glossary，不许擅自翻译。</p>\n<h2>第一批术语（约 50 条）</h2>\n<p>详见 <code>data/glossary.yaml</code> 完整列表。下面是分类速览：</p>\n<h3>酱油类</h3>\n<ul>\n<li>生抽 → Light soy sauce</li>\n<li>老抽 → Dark soy sauce</li>\n<li>蚝油 → Oyster sauce</li>\n<li>鱼露 → Fish sauce</li>\n</ul>\n<h3>醋类</h3>\n<ul>\n<li>米醋 → Rice vinegar (≠ white vinegar)</li>\n<li>黑醋 → Chinese black vinegar / Chinkiang vinegar</li>\n</ul>\n<h3>整香料</h3>\n<ul>\n<li>八角 / 大料 → Star anise (≠ big spice)</li>\n<li>香叶 → Bay leaf</li>\n<li>桂皮 → Cassia bark / Chinese cinnamon (中餐多用 cassia)</li>\n<li>白胡椒粒 → White peppercorn</li>\n<li>花椒 → Sichuan peppercorn (≠ black pepper)</li>\n<li>陈皮 → Dried tangerine peel</li>\n<li>干辣椒 → Dried chili</li>\n</ul>\n<h3>干鲜</h3>\n<ul>\n<li>出汁粉 → Dashi powder (≠ broth powder)</li>\n<li>干香菇 → Dried shiitake mushrooms</li>\n<li>海带 → Kombu / dried kelp</li>\n</ul>\n<h3>生鲜香辛</h3>\n<ul>\n<li>姜 → Ginger</li>\n<li>蒜 → Garlic</li>\n<li>葱 → Scallion / green onion</li>\n<li>香茅 → Lemongrass</li>\n<li>南姜 → Galangal (≠ ginger)</li>\n<li>柠檬叶 → Makrut lime leaves (避免争议词 &#39;kaffir&#39;)</li>\n</ul>\n<h3>蛋白质</h3>\n<ul>\n<li>牛腩 → Beef brisket / beef flank</li>\n<li>五花肉 → Pork belly</li>\n<li>鸡腿肉 → Chicken thigh</li>\n<li>虾仁 → Peeled shrimp</li>\n</ul>\n<h3>蔬菜</h3>\n<ul>\n<li>白萝卜 → Daikon radish</li>\n<li>卷心菜 / 圆白菜 → Cabbage</li>\n</ul>\n<h3>主食</h3>\n<ul>\n<li>河粉 → Rice noodles / flat rice noodles</li>\n<li>乌冬 → Udon</li>\n</ul>\n<h3>工艺</h3>\n<ul>\n<li>焯水 → Blanch</li>\n<li>红烧 → Hongshao braise / red-braise</li>\n<li>上浆 → Velveting</li>\n</ul>\n<h2>怎么贡献新术语</h2>\n<p>如果你 add-dish 时遇到 glossary 没有的词，skill 会触发 Step 4 子流程跟你确认 zh / en / alias / category 后追加。\n也可以直接提 PR 加。</p>\n<div class=\"search\">\n      <span class=\"muted\">⌕</span>\n      <input type=\"search\" placeholder=\"搜索术语… (中或英)\" />\n    </div>\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin:16px 0\"><a class=\"filter-pill active\" href=\"#\" data-cat=\"all\">all</a> <a class=\"filter-pill\" href=\"#\" data-cat=\"sauce\">sauce</a> <a class=\"filter-pill\" href=\"#\" data-cat=\"vinegar\">vinegar</a> <a class=\"filter-pill\" href=\"#\" data-cat=\"paste\">paste</a> <a class=\"filter-pill\" href=\"#\" data-cat=\"whole-spice\">whole-spice</a> <a class=\"filter-pill\" href=\"#\" data-cat=\"ground-spice\">ground-spice</a> <a class=\"filter-pill\" href=\"#\" data-cat=\"technique\">technique</a> <a class=\"filter-pill\" href=\"#\" data-cat=\"fresh-aromatic\">fresh-aromatic</a> <a class=\"filter-pill\" href=\"#\" data-cat=\"protein\">protein</a> <a class=\"filter-pill\" href=\"#\" data-cat=\"vegetable\">vegetable</a> <a class=\"filter-pill\" href=\"#\" data-cat=\"grain\">grain</a></div>\n    <div class=\"grid-3\"><div class=\"term-card pitfall\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">sauce</span>\n      <span class=\"term-card__warn\">⚠ PITFALL</span>\n    </div>\n    <div class=\"term-card__zh\">生抽</div>\n    <div class=\"term-card__en\">Light soy sauce</div>\n    \n    <div class=\"term-card__pitfall\">✗ never: \"soy sauce\"</div>\n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">sauce</span>\n      \n    </div>\n    <div class=\"term-card__zh\">老抽</div>\n    <div class=\"term-card__en\">Dark soy sauce</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">sauce</span>\n      \n    </div>\n    <div class=\"term-card__zh\">蚝油</div>\n    <div class=\"term-card__en\">Oyster sauce</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">sauce</span>\n      \n    </div>\n    <div class=\"term-card__zh\">鱼露</div>\n    <div class=\"term-card__en\">Fish sauce</div>\n    \n    \n  </div><div class=\"term-card pitfall\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">vinegar</span>\n      <span class=\"term-card__warn\">⚠ PITFALL</span>\n    </div>\n    <div class=\"term-card__zh\">米醋</div>\n    <div class=\"term-card__en\">Rice vinegar</div>\n    \n    <div class=\"term-card__pitfall\">✗ never: \"white vinegar\"</div>\n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">vinegar</span>\n      \n    </div>\n    <div class=\"term-card__zh\">黑醋</div>\n    <div class=\"term-card__en\">Chinese black vinegar</div>\n    <div class=\"term-card__alias\">alias · en: Chinkiang vinegar, 镇江醋</div>\n    \n  </div><div class=\"term-card pitfall\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">paste</span>\n      <span class=\"term-card__warn\">⚠ PITFALL</span>\n    </div>\n    <div class=\"term-card__zh\">郫县豆瓣酱</div>\n    <div class=\"term-card__en\">Pixian chili bean paste</div>\n    <div class=\"term-card__alias\">alias · en: doubanjiang</div>\n    <div class=\"term-card__pitfall\">✗ never: \"bean sauce\"</div>\n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">paste</span>\n      \n    </div>\n    <div class=\"term-card__zh\">韩式辣酱</div>\n    <div class=\"term-card__en\">Gochujang</div>\n    <div class=\"term-card__alias\">alias · en: Korean chili paste</div>\n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">paste</span>\n      \n    </div>\n    <div class=\"term-card__zh\">味噌</div>\n    <div class=\"term-card__en\">Miso</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">paste</span>\n      \n    </div>\n    <div class=\"term-card__zh\">泰式红咖喱酱</div>\n    <div class=\"term-card__en\">Thai red curry paste</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">paste</span>\n      \n    </div>\n    <div class=\"term-card__zh\">泰式绿咖喱酱</div>\n    <div class=\"term-card__en\">Thai green curry paste</div>\n    \n    \n  </div><div class=\"term-card pitfall\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">whole-spice</span>\n      <span class=\"term-card__warn\">⚠ PITFALL</span>\n    </div>\n    <div class=\"term-card__zh\">八角</div>\n    <div class=\"term-card__en\">Star anise</div>\n    <div class=\"term-card__alias\">alias · zh: 大料</div>\n    <div class=\"term-card__pitfall\">✗ never: \"big spice, generic spice\"</div>\n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">whole-spice</span>\n      \n    </div>\n    <div class=\"term-card__zh\">香叶</div>\n    <div class=\"term-card__en\">Bay leaf</div>\n    \n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">whole-spice</span>\n      \n    </div>\n    <div class=\"term-card__zh\">桂皮</div>\n    <div class=\"term-card__en\">Cassia bark</div>\n    <div class=\"term-card__alias\">alias · en: Chinese cinnamon</div>\n    \n  </div><div class=\"term-card\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">whole-spice</span>\n      \n    </div>\n    <div class=\"term-card__zh\">白胡椒粒</div>\n    <div class=\"term-card__en\">White peppercorn</div>\n    \n    \n  </div><div class=\"term-card pitfall\">\n    <div class=\"term-card__top\">\n      <span class=\"term-card__category\">whole-spice</span>\n      <span class=\"term-card__warn\">⚠ PITFALL</span>\n    </div>\n    <div class=\"term-card__zh\">花椒</div>\n    <div class=\"
