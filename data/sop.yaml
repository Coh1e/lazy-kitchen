# 标准操作流程 / SOPs (Standard Operating Procedures)
# 1 个端到端示例（SOP-CANTON-CLEAR-BEEF-001 状态 approved）+ 18 个 MVP 占位。

items:
  # ─────────── 端到端示例 / End-to-end example ───────────
  - id: SOP-CANTON-CLEAR-BEEF-001
    name: { zh: 广式清汤牛腩 SOP, en: Cantonese clear-broth beef brisket SOP }
    category: regional
    heat_type: moist
    cooking_method: simmer
    station: saucier
    time_tier: half-day
    heat_level_used: simmer
    cut_required: []
    equipment_required: [HW-SOUP-POT, HW-SPICE-SACHETS]
    optional_if_pre_prepped: false
    hardware: [HW-SOUP-POT, HW-CHEF-KNIFE]
    steps:
      zh: |
        1. 牛腩冷水下锅，水开后焯水 3–5 分钟。
        2. 捞出后用温水冲洗血沫，沥干切大块（5cm 见方）。
        3. 汤锅注入 1.5–2L 清水，下牛腩、3 片姜、广式清汤牛腩香料包。
        4. 大火烧开后转微火，加盖虚掩，慢炖 90–150 分钟。
        5. 出锅前 25–40 分钟下白萝卜（切大块）。
        6. 起锅前调味：盐 + 鱼露少许 + 冰糖 5g 试味。
        7. 撒葱花，可配米线/河粉/米饭。
      en: |
        1. Place beef brisket in cold water; bring to boil, blanch 3–5 minutes.
        2. Remove, rinse off scum with warm water, drain, cut into ~5cm cubes.
        3. To soup pot: 1.5–2L water + beef + 3 ginger slices + spice pack.
        4. Bring to a hard boil, then drop to a bare simmer with lid ajar; simmer 90–150 minutes.
        5. Add daikon (large cubes) for the last 25–40 minutes.
        6. Season at the end: salt + a touch of fish sauce + ~5g rock sugar; taste.
        7. Top with chopped scallion; serve over rice noodles, flat noodles, or rice.
    tips:
      zh: |
        - 焯水必须冷水下锅，否则血沫锁在肉里
        - 微火虚掩盖以保汤清；大火翻滚 = 浑汤
        - 萝卜不要一开始就下，会发苦
        - 鱼露用量很小，目的是增鲜不夺味
      en: |
        - Blanch from cold water; hot start traps scum inside the meat
        - Bare simmer with lid ajar keeps broth clear; rolling boil = cloudy broth
        - Daikon goes in late or it turns bitter
        - Use fish sauce sparingly — it deepens umami without imposing its own flavor
    status: approved
    cross_reviewed: true
    cross_reviewer_cli: manual
    cross_reviewer_model: human-curator
    cross_review_at: 2026-04-25T00:00:00Z

