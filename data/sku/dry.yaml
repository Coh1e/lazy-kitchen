    packaging:
      zh:
        - 整香料放入茶包袋
        - 外层用真空袋封口
        - 常温避光防潮
      en:
        - Place whole spices into a spice sachet bag
        - Vacuum-seal the outer bag
        - Store in a cool, dark, dry place
