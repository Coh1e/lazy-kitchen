# 生鲜香辛 / Fresh aromatics (L2)
# 不预制，按需买；procurement_mode 区分常备/按需。

items:
  # ─────────── 常备 / Always keep ───────────
  - id: ING-GINGER
    name: { zh: 姜, en: Ginger }
    category: fresh-aromatic
    storage_profile: fridge-fresh
    procurement_mode: bulk_pantry
    diet_tags: [vegan, vegetarian, halal, kosher, no-pork, gluten-free, nut-free, dairy-free]
    buying_notes:
      zh: 选硬实有重量的；可切片冷冻
      en: Choose firm, heavy roots; can slice and freeze
    mvp_level: core
    status: approved

  - id: ING-GARLIC
    name: { zh: 蒜, en: Garlic }
    category: fresh-aromatic
    storage_profile: pantry-dry-dark
    procurement_mode: bulk_pantry
    diet_tags: [vegan, vegetarian, halal, kosher, no-pork, gluten-free, nut-free, dairy-free]
    buying_notes:
      zh: 整头买、用前剥；剥好的市售蒜易失风味
      en: Buy whole heads; pre-peeled garlic loses flavor quickly
    mvp_level: core
    status: approved

  - id: ING-SCALLION
    name: { zh: 葱, en: Scallion }
    aliases:
      en: [green onion]
    category: fresh-aromatic
    storage_profile: fridge-fresh
    procurement_mode: bulk_pantry
    mvp_level: core
    status: approved

  # ─────────── 按需买 / Buy when needed ───────────
  - id: ING-CILANTRO
    name: { zh: 香菜, en: Cilantro }
