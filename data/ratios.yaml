  - id: RATIO-MOTHER-BECHAMEL-v1
    name: { zh: 白酱基底 / 贝夏梅尔, en: Béchamel mother sauce }
    is_mother: true
    parent: null
    daughters: []
    ratio:
      formula: 'roux 1:1 + milk 10x'
      components:
        - item: { zh: 黄油, en: Butter }
          parts: 1
        - item: { zh: 面粉, en: Flour }
          parts: 1
        - item: { zh: 牛奶, en: Milk }
          parts: 10
    cuisine: { region: 法 / 经典法餐, country: FR }
    use_with:
      - { zh: 千层面 / 焗菜 / 奶油浓汤, en: Lasagne / gratins / cream soups }
    notes:
      zh: 万能白酱母体；加奶酪 → mornay；加洋葱 → soubise
      en: Universal white sauce base; +cheese = mornay; +onion = soubise
    status: approved
    cross_reviewed: true
    cross_reviewer_cli: manual
    cross_reviewer_model: human-curator
    cross_review_at: 2026-04-25T00:00:00Z

