# 调味公式 / Flavor ratios + Mother sauces
# 5 大经典母酱 + 中式扩展（红烧基础）+ 几个常用派生比例。
# Escoffier's 5 mother sauces + CN-BRAISE + commonly-used derivatives.

ratios:
